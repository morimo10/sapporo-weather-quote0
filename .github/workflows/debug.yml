name: Update Weather and Clothing for Dot V2 (JMA 3-Hour Debug Fix)

on:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run JMA 3-Hour API Debugger
        run: |
          cat << 'EOF' > debug_3hour.py
          import requests
          import json
          from datetime import datetime, timedelta, timezone

          # 気象庁の地域時系列予報（3時間ごと）の正式なデータソースURL
          # 016000.json ではなく、石狩地方などの詳細を直接持つ「016000」以外の可能性も含め検証
          URLS = [
              "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json",
              "https://www.jma.go.jp/bosai/forecast/data/jma/016000.json"
          ]

          print("================ JMA 3-HOUR URL VERIFICATION ================")

          for url in URLS:
              print(f"\nTesting URL: {url}")
              try:
                  res = requests.get(url, timeout=15)
                  print(f"Status Code: {res.status_code}")
                  if res.status_code != 200:
                      continue
                      
                  data = res.json()
                  print("👉 JSONの取得に成功しました！")
                  
                  # 取得できたJSONの最上位のキーまたは長さを出力
                  if isinstance(data, list):
                      print(f"データ型: List (長さ: {len(data)})")
                      # リストの場合、各要素のtimeSeriesの構造を確認
                      for idx, block in enumerate(data):
                          print(f"  Block [{idx}] keys: {block.keys()}")
                          if "timeSeries" in block:
                              for ts_idx, ts in enumerate(block["timeSeries"]):
                                  t_defines = ts.get("timeDefines", [])
                                  print(f"    timeSeries[{ts_idx}] timeDefines件数: {len(t_defines)}")
                                  if t_defines:
                                      print(f"      最初の時間: {t_defines[0]}")
                                  
                                  # エリアごとのデータの中身のキーをチェック
                                  for area in ts.get("areas", []):
                                      a_name = area.get("area", {}).get("name", "")
                                      a_code = area.get("area", {}).get("code", "")
                                      if "札幌" in a_name or "石狩" in a_name or str(a_code) in ["016010", "14163"]:
                                          print(f"      エリア発見: {a_name} ({a_code}) -> キー一覧: {list(area.keys())}")
                  else:
                      print(f"データ型: Dict (キー一覧: {list(data.keys())})")
                      
              except Exception as e:
                  print(f"エラーが発生しました: {e}")

          print("\n=============================================================")
          EOF
          python debug_3hour.py
