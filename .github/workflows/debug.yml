name: Update Weather and Clothing for Dot V2 (JMA Data Mapping Debug)

on:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run JMA Detail Mapper Debugger
        run: |
          cat << 'EOF' > debug_mapping.py
          import requests
          from datetime import datetime, timedelta, timezone

          URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"

          try:
              res = requests.get(URL, timeout=15).json()
              jst_tz = timezone(timedelta(hours=9))
              
              print("================ JMA FORECAST MAPPING DEBUG ================")
              block0 = res[0]
              time_series_list = block0.get("timeSeries", [])
              
              # --- 1. 天気コードブロック (timeSeries[0]) ---
              print("\n■ 【timeSeries[0]】天気コード・風・波のブロック")
              ts0_times = time_series_list[0].get("timeDefines", [])
              print(f"  時間定義数: {len(ts0_times)}")
              for idx, t in enumerate(ts0_times):
                  dt = datetime.fromisoformat(t.replace("Z", "+00:00")).astimezone(jst_tz)
                  print(f"    Index [{idx}]: {dt.strftime('%Y-%m-%d %H:%M')} ({t})")
              
              for area in time_series_list[0].get("areas", []):
                  if "石狩" in area.get("area", {}).get("name", ""):
                      print(f"    👉 石狩地方の天気コード: {area.get('weatherCodes', [])}")

              # --- 2. 降水確率ブロック (timeSeries[1]) ---
              print("\n■ 【timeSeries[1]】降水確率(pops)のブロック")
              ts1_times = time_series_list[1].get("timeDefines", [])
              print(f"  時間定義数: {len(ts1_times)}")
              for idx, t in enumerate(ts1_times):
                  dt = datetime.fromisoformat(t.replace("Z", "+00:00")).astimezone(jst_tz)
                  print(f"    Index [{idx}]: {dt.strftime('%Y-%m-%d %H:%M')} ({t})")
              
              for area in time_series_list[1].get("areas", []):
                  if "石狩" in area.get("area", {}).get("name", ""):
                      print(f"    👉 石狩地方の降水確率配列: {area.get('pops', [])}")

              # --- 3. 気温ブロック (timeSeries[2]) ---
              print("\n■ 【timeSeries[2]】3時間ごと気温(temps)のブロック")
              ts2_times = time_series_list[2].get("timeDefines", [])
              print(f"  時間定義数: {len(ts2_times)}")
              for idx, t in enumerate(ts2_times):
                  dt = datetime.fromisoformat(t.replace("Z", "+00:00")).astimezone(jst_tz)
                  print(f"    Index [{idx}]: {dt.strftime('%Y-%m-%d %H:%M')} ({t})")
              
              for area in time_series_list[2].get("areas", []):
                  if "札幌" in area.get("area", {}).get("name", "") or "14163" in str(area.get("area", {}).get("code", "")):
                      print(f"    👉 札幌の気温配列: {area.get('temps', [])}")

              print("\n============================================================")

          except Exception as e:
              print(f"デバッグ実行中にエラーが発生しました: {e}")
          EOF
          python debug_mapping.py
