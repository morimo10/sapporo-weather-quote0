name: Update Weather and Clothing for Dot V2 (JMA 3-Hour Debug)

on:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run JMA 3-Hour API Debugger
        run: |
          cat << 'EOF' > debug_3hour.py
          import requests
          from datetime import datetime, timedelta, timezone

          # 3時間ごとの地域時系列予報用URLに変更
          JMA_3HOUR_URL = "https://www.jma.go.jp/bosai/forecast/data/jma/016000.json"

          try:
              res = requests.get(JMA_3HOUR_URL, timeout=15).json()
              jst_tz = timezone(timedelta(hours=9))
              now = datetime.now(timezone.utc).astimezone(jst_tz)

              print("================ JMA 3-HOUR DEBUG LOG ================")
              print(f"現在時刻 (JST): {now.strftime('%Y-%m-%d %H:%M:%S')}")
              
              # 通常、このJSONはリストではなく1つの大きな辞書構造になっています
              # timeSeries 内の構造をスキャンします
              time_series_list = res.get("timeSeries", [])
              print(f"timeSeriesのブロック数: {len(time_series_list)}")

              for ts_idx, ts in enumerate(time_series_list):
                  time_defines = ts.get("timeDefines", [])
                  print(f"\n▼ timeSeries[{ts_idx}] - 時間定義 ({len(time_defines)}件):")
                  for idx, t_str in enumerate(time_defines[:4]): # 最初の4件だけサンプル表示
                      cleaned_t = t_str.replace("Z", "+00:00")
                      dt_parsed = datetime.fromisoformat(cleaned_t).astimezone(jst_tz)
                      print(f"  Index [{idx}]: {dt_parsed.strftime('%m/%d %H:%M')}")

                  print(f"--- areas 内のデータ探索 ---")
                  for area_data in ts.get("areas", []):
                      area_name = area_data.get("area", {}).get("name", "")
                      area_code = area_data.get("area", {}).get("code", "")
                      
                      if "札幌" in area_name or area_code in ["016010", "14163"]:
                          print(f"  👉 エリア発見: {area_name} (コード: {area_code})")
                          for k, v in area_data.items():
                              if k != "area":
                                  # 3時間ごとのデータ配列（最初の数件）を表示
                                  print(f"    {k}: {v[:6]}")

              print("\n===================================================")

          except Exception as e:
              print(f"デバッグ実行中にエラーが発生しました: {e}")
          EOF
          python debug_3hour.py
