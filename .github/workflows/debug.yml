name: Update Weather and Clothing for Dot V2 (True 3-Hour Debug)

on:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run True 3-Hour API Debugger
        run: |
          cat << 'EOF' > debug_true_3hour.py
          import requests
          from datetime import datetime, timedelta, timezone

          # 石狩地方 (札幌) の地域時系列予報用URL
          URL = "https://www.jma.go.jp/bosai/forecast/data/jma/016010.json"

          try:
              res = requests.get(URL, timeout=15)
              print(f"Status Code: {res.status_code}")
              if res.status_code != 200:
                  print("URLが存在しません。")
                  exit(1)
                  
              data = res.json()
              print("================ JMA TRUE 3-HOUR DEBUG LOG ================")
              
              # 時系列データのスキャン
              time_series = data.get("timeSeries", [])
              print(f"timeSeriesのブロック数: {len(time_series)}")
              
              for ts_idx, ts in enumerate(time_series):
                  t_defines = ts.get("timeDefines", [])
                  print(f"\n▼ timeSeries[{ts_idx}] 時間定義数: {len(t_defines)}")
                  if t_defines:
                      print(f"  最初の時間サンプル: {t_defines[:3]}")
                  
                  for area in ts.get("areas", []):
                      a_name = area.get("area", {}).get("name", "")
                      a_code = area.get("area", {}).get("code", "")
                      print(f"    👉 エリア: {a_name} ({a_code})")
                      print(f"      含まれるキー: {list(area.keys())}")
                      for k, v in area.items():
                          if k != "area":
                              print(f"      {k}: {v[:4]}") # 最初の4件をダンプ

              print("\n=============================================================")

          except Exception as e:
              print(f"エラーが発生しました: {e}")
          EOF
          python debug_true_3hour.py
