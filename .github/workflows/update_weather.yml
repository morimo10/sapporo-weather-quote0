name: Update Weather and Clothing for Dot V2 (Hybrid JMA Slots Fixed)

on:
  schedule:
    # 30分ごとに自動実行
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 【正しいURL】models=best_match(標準)とjma_seamless(気象庁)を並べ、hourlyでデータをまとめて請求します。
        OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.0620&longitude=141.3540&hourly=temperature_2m,precipitation_probability,weather_code&timezone=Asia%2FTokyo&models=best_match,jma_seamless"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(code):
            if code is None: return "⛅"
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp is None: return " 調整着"
            if temp >= 30.0: return " Tシャツ"
            elif temp >= 25.0: return " 半袖"
            elif temp >= 20.0: return " 長袖"
            elif temp >= 15.0: return " セーター"
            elif temp >= 10.0: return " ジャケット"
            elif temp >= 5.0: return " コート"
            else: return " ダウン"

        try:
            response_weather = requests.get(OPEN_METEO_URL)
            res = response_weather.json()
            
            if 'hourly' not in res:
                print(f"APIレスポンスエラー: {res}")
                exit(1)
                
            hourly = res['hourly']
            h_time_strings = hourly.get('time', [])
            
            # 複数モデルを指定した際、APIから返ってくる正しいキー名（末尾にモデル名が付く）で正確にキャッチします
            h_temp_jma = hourly.get('temperature_2m_jma_seamless', [])
            h_code_jma = hourly.get('weather_code_jma_seamless', [])
            
            # 降水確率はデータ切れの起きない標準モデル(best_match)から取得
            h_prob_std = hourly.get('precipitation_probability_best_match', hourly.get('precipitation_probability', []))
            
            title_text = "札幌市中央区の天気"
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            # 夜21時以降は明日の予定を表示
            target_date = now if now.hour < 21 else now + timedelta(days=1)
            
            slots = [
                ("朝(09:00)", 9),
                ("昼(15:00)", 15),
                ("夜(21:00)", 21)
            ]
            
            forecast_lines = []
            
            for label, hour in slots:
                target_dt = target_date.replace(hour=hour, minute=0, second=0, microsecond=0)
                target_time_str = target_dt.strftime("%Y-%m-%dT%H:%M")
                
                idx = -1
                if target_time_str in h_time_strings:
                    idx = h_time_strings.index(target_time_str)
                
                # 気象庁のリアルな気温と天気
                raw_temp = h_temp_jma[idx] if (idx != -1 and idx < len(h_temp_jma)) else None
                raw_code = h_code_jma[idx] if (idx != -1 and idx < len(h_code_jma)) else None
                # 標準モデルの確実な降水確率
                raw_prob = h_prob_std[idx] if (idx != -1 and idx < len(h_prob_std)) else None
                
                if raw_temp is not None:
                    temp_num = round(raw_temp)
                    temp_display = f"{temp_num}°C"
                    clothing = get_clothing_advice(temp_num)
                else:
                    temp_display = "?°C"
                    clothing = get_clothing_advice(None)
                
                if raw_prob is not None:
                    prob_num = int(raw_prob)
                    prob_display = f"{prob_num}%"
                else:
                    prob_display = "0%"
                
                emoji = get_weather_emoji(raw_code)
                
                temp_aligned = temp_display.rjust(5)
                prob_aligned = prob_display.rjust(4)
                
                forecast_lines.append(f"{label} {emoji} {temp_aligned} {prob_aligned}{clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（朝昼夜ハイブリッド・エラー修正版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
