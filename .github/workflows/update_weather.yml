name: Update Weather and Clothing for Dot V2 (Pure JMA Minimalist Message)

on:
  schedule:
    # 30分ごとに自動実行
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 気象庁（JMA）公式の生データJSON
        JMA_FORECAST_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_symbol(text):
            if not text: return "☁"
            
            if "晴" in text and "雨" in text:
                return "☀→☔" if text.find("晴") < text.find("雨") else "☔→☀"
            elif "晴" in text and "曇" in text:
                return "☀→☁" if text.find("晴") < text.find("曇") else "☁→☀"
            elif "曇" in text and "雨" in text:
                return "☁→☔" if text.find("曇") < text.find("雨") else "☔→☁"
            elif "曇" in text and "雪" in text:
                return "☁→☃" if text.find("曇") < text.find("雪") else "☃→☁"
            elif "雨" in text and "雪" in text:
                return "☔→☃" if text.find("雨") < text.find("雪") else "☃→☔"
            
            if "晴" in text: return "☀"
            elif "曇" in text: return "☁"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "☃"
            elif "雷" in text: return "⚡"
            return "☁"

        def get_clothing_advice(temp):
            if temp is None: return " 全着"
            if temp >= 30: return " Ｔシャツ"
            elif temp >= 25: return " 半袖シャツ"
            elif temp >= 20: return " 長袖シャツ"
            elif temp >= 15: return " ジャケット"
            elif temp >= 10: return " コート"
            else: return " ダウン"

        try:
            res = requests.get(JMA_FORECAST_URL).json()
            area_forecast = res[0]
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            # 夜21時以降は「明日」のデータへシフト
            is_tomorrow = now.hour >= 21
            day_idx = 1 if is_tomorrow else 0
            label_head = "明日" if is_tomorrow else "今日"
            
            # --- 1. 天気記号の取得 ---
            weather_areas = area_forecast['timeSeries'][0]['areas']
            sapporo_weather = next((a for a in weather_areas if a['area']['code'] == '016010'), weather_areas[0])
            
            weather_text = sapporo_weather['weathers'][day_idx]
            day_symbol = get_weather_symbol(weather_text)
            title_text = f"札幌市中央区の{label_head}: {day_symbol}"
            
            # --- 2. 降水確率の取得 ---
            prob_time_series = area_forecast['timeSeries'][1]
            prob_areas = prob_time_series['areas']
            sapporo_prob = next((a for a in prob_areas if a['area']['code'] == '016010'), prob_areas[0])
            
            prob_pops = sapporo_prob['pops']
            prob_times = prob_time_series['timeDefines']
            
            target_date_str = (now if not is_tomorrow else now + timedelta(days=1)).strftime("%Y-%m-%d")
            day_pops = []
            for t_str, pop in zip(prob_times, prob_pops):
                if target_date_str in t_str:
                    day_pops.append(int(pop))
            
            max_prob = max(day_pops) if day_pops else 0
            prob_str = f"{max_prob}%"
            umbrella_mark = " ☔" if max_prob >= 50 else (" ☂" if max_prob >= 30 else "")
            
            # --- 3. 最高・最低気温の取得 ---
            temp_time_series = area_forecast['timeSeries'][2]
            temp_areas = temp_time_series['areas']
            sapporo_temp = next((a for a in temp_areas if a['area']['code'] == '016010'), temp_areas[0])
            
            temps = sapporo_temp['temps']
            if len(temps) >= 4:
                tmin_val = temps[2] if is_tomorrow else temps[0]
                tmax_val = temps[3] if is_tomorrow else temps[1]
            else:
                tmin_val = temps[0] if len(temps) > 0 else "?"
                tmax_val = temps[1] if len(temps) > 1 else "?"

            if not is_tomorrow and (tmin_val == tmax_val or int(tmin_val) > int(tmax_val)):
                try:
                    tmin_val = res[1]['timeSeries'][1]['areas'][0]['tempsMin'][0]
                except:
                    tmin_val = "14"
            
            # --- 4. 時間ごとの気温算出 ---
            t_max_num = int(tmax_val) if tmax_val != "?" else 25
            t_min_num = int(tmin_val) if tmin_val != "?" else 14
            
            temp_06 = t_min_num + 1
            temp_12 = t_max_num - 2
            temp_18 = t_max_num - 4
            
            # 【要望対応】「今日（明日）の」を完全削除して「最大降水確率：」から開始
            forecast_lines = [
                f"最大降水確率：{prob_str}{umbrella_mark}",
                f"最低: {tmin_val}°C  最高: {tmax_val}°C",
                f"06:00 {day_symbol}  {temp_06}°C{get_clothing_advice(temp_06)}",
                f"12:00 {day_symbol}  {temp_12}°C{get_clothing_advice(temp_12)}",
                f"18:00 {day_symbol}  {temp_18}°C{get_clothing_advice(temp_18)}"
            ]
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（日付ラベル削除版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
