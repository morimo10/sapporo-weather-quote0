name: Update Weather and Clothing for Dot V2 (JMA-MSM)

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        # GitHub Secretsから安全に読み込み
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 1. 札幌市中央区の座標 ＋ 気象庁MSMモデル（models=jma_msm）を強制指定
        OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.0553&longitude=141.3409&hourly=temperature_2m,precipitation_probability,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&models=jma_msm"
        
        # Dot. APIエンドポイントURL
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        # 天気コード（WMO）を絵文字にマッピング
        def get_weather_emoji(code):
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "❓"

        # 気温に応じた衣類・服装情報の判定ロジック
        def get_clothing_advice(temp):
            if temp >= 25.0: return "半袖シャツ"
            elif temp >= 20.0: return "長袖シャツ"
            elif temp >= 16.0: return "カーディガン"
            elif temp >= 12.0: return "セーター"
            elif temp >= 8.0: return "トレンチコート"
            elif temp >= 5.0: return "冬物コート"
            else: return "ダウンコート"

        try:
            # 天気データの取得
            response_weather = requests.get(OPEN_METEO_URL)
            res = response_weather.json()
            
            # APIエラーチェック（jma_msm指定時は、指定モデルのキー内にデータが入るため柔軟に取得します）
            if 'hourly' not in res or 'daily' not in res:
                print(f"Open-Meteo APIエラーレスポンス: {res}")
                exit(1)
                
            hourly = res['hourly']
            daily = res['daily']
            
            # 最高気温・最低気温の取得と整数化
            max_temp_today = round(daily['temperature_2m_max'][0])
            min_temp_today = round(daily['temperature_2m_min'][0])
            
            # タイトル形式（短縮版）
            title_text = f"札幌市中央区 {max_temp_today}℃〜{min_temp_today}℃"
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            times = [datetime.fromisoformat(t).replace(tzinfo=jst) for t in hourly['time']]
            current_idx = min(range(len(times)), key=lambda i: abs(times[i] - now))
            
            # 3時間ごと（現在、3時間後、6時間後）のインデックスを指定
            target_indices = [current_idx, current_idx + 3, current_idx + 6]
            
            forecast_lines = []
            
            for idx in target_indices:
                if idx < len(times):
                    t = times[idx].strftime("%H:%M")
                    raw_temp = hourly['temperature_2m'][idx]
                    prob_val = hourly['precipitation_probability'][idx]
                    code = hourly['weather_code'][idx]
                    
                    emoji = get_weather_emoji(code)
                    clothing = get_clothing_advice(raw_temp)
                    
                    # 気温の四捨五入（整数化）
                    temp_int = round(raw_temp)
                    
                    # 右寄せ用に文字幅を揃えて成形
                    temp_str = f"{temp_int}°C"
                    prob_str = f"{prob_val}%"
                    
                    temp_aligned = temp_str.rjust(5)
                    prob_aligned = prob_str.rjust(4)
                    
                    forecast_lines.append(f"{t} {emoji} {temp_aligned} {prob_aligned} {clothing}")
            
            # 通常の改行文字で結合
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（気象庁MSMモデル） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("------------------------------------------")

            # 2. Dot. APIへ送信するヘッダーとパラメータ
            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                print(f"レスポンス内容: {response.text}")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
