name: Update Weather and Clothing for Dot V2 (Pure JMA Hourly Eco Version)

on:
  schedule:
    - cron: '17 0-9,21-23 * * *'
    - cron: '37 0-9,21-23 * * *'
    - cron: '47 0-9,21-23 * * *'
    - cron: '53 0-9,21-23 * * *'
  workflow_dispatch:

concurrency:
  group: daytime-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. гӮӯгғЈгғғгӮ·гғҘгҒ®еҫ©е…ғпјҲv25гҒ«гӮўгғғгғ—гғҮгғјгғҲпјү
      - name: Restore Last Run Hour and Temp Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            last_run_hour.txt
            weather_history.json
          key: weather-v2-cache-v25-
          restore-keys: |
            weather-v2-cache-v25-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 2. гғЎгӮӨгғіеҮҰзҗҶгҒ®е®ҹиЎҢ
      - name: Generate and Push to Dot API
        env:
          QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
          QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
        run: |
          cat << 'EOF' > update_weather.py
          import os
          import json
          import time
          import requests
          from datetime import datetime, timedelta, timezone

          API_KEY = os.environ.get("QUOTE0_API_KEY")
          DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

          JMA_FORECAST_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
          DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

          # еӨ©ж°—гӮігғјгғүгҒӢгӮүзӣҙжҺҘиҰ–иӘҚжҖ§гҒ®й«ҳгҒ„зөөж–Үеӯ—иЎЁзҸҫгҒёгғһгғғгғ”гғігӮ°
          JMA_WEATHER_MAP = {
              "100": "вҳҖ", "101": "вҳҖв”ӮвҳҒ", "102": "вҳҖв”Ӯвҳ”", "103": "вҳҖв”Ӯвҳ”", "104": "вҳҖв”Ӯвқ„",
              "105": "вҳҖв”Ӯвқ„", "106": "вҳҖв”Ӯвҳ”вқ„", "107": "вҳҖв”Ӯвҳ”вқ„", "108": "вҳҖв”Ӯвҳ”вҡЎ",
              "110": "вҳҖвҶ’вҳҒ", "111": "вҳҖвҶ’вҳҒ", "112": "вҳҖвҶ’вҳ”", "113": "вҳҖвҶ’вҳ”", "114": "вҳҖвҶ’вҳ”",
              "115": "вҳҖвҶ’вқ„", "116": "вҳҖвҶ’вқ„", "117": "вҳҖвҶ’вқ„", "118": "вҳҖвҶ’вҳ”вқ„", "119": "вҳҖвҶ’вҳ”вҡЎ",
              "120": "вҳҖв”Ӯвҳ”", "121": "вҳҖв”Ӯвҳ”", "122": "вҳҖв”Ӯвҳ”", "123": "вҳҖв”Ӯвҳ”вҡЎ",
              "124": "вҳҖв”Ӯвқ„", "125": "вҳҖв”Ӯвҳ”вҡЎ", "126": "вҳҖвҶ’вҳ”", "127": "вҳҖвҶ’вҳ”", "128": "вҳҖвҶ’вҳ”",
              "130": "рҹҢ«вҶ’вҳҖ", "131": "вҳҖв”ӮрҹҢ«", "132": "вҳҖв”ӮвҳҒ", "140": "вҳҖв”Ӯвҳ”вҡЎ",
              "160": "вҳҖв”Ӯвҳ”вқ„", "170": "вҳҖв”Ӯвҳ”вқ„", "181": "вҳҖвҶ’вҳ”вқ„",
              
              "200": "вҳҒ", "201": "вҳҒв”ӮвҳҖ", "202": "вҳҒв”Ӯвҳ”", "203": "вҳҒв”Ӯвҳ”", "204": "вҳҒв”Ӯвқ„",
              "205": "вҳҒв”Ӯвқ„", "206": "вҳҒв”Ӯвҳ”вқ„", "207": "вҳҒв”Ӯвҳ”вқ„", "208": "вҳҒв”Ӯвҳ”вҡЎ", "209": "рҹҢ«",
              "210": "вҳҒвҶ’вҳҖ", "211": "вҳҒвҶ’вҳҖ", "212": "вҳҒвҶ’вҳ”", "213": "вҳҒвҶ’вҳ”", "214": "вҳҒвҶ’вҳ”",
              "215": "вҳҒвҶ’вқ„", "216": "вҳҒвҶ’вқ„", "217": "вҳҒвҶ’вқ„", "218": "вҳҒвҶ’вҳ”вқ„", "219": "вҳҒвҶ’вҳ”вҡЎ",
              "220": "вҳҒв”Ӯвҳ”", "221": "вҳҒв”Ӯвҳ”", "222": "вҳҒв”Ӯвҳ”", "223": "вҳҒв”ӮвҳҖ",
              "224": "вҳҒвҶ’вҳ”", "225": "вҳҒвҶ’вҳ”", "226": "вҳҒвҶ’вҳ”", "228": "вҳҒвҶ’вқ„", "229": "вҳҒвҶ’вқ„",
              "230": "вҳҒвҶ’вқ„", "231": "вҳҒв”ӮрҹҢ«", "240": "вҳҒв”Ӯвҳ”вҡЎ", "250": "вҳҒв”Ӯвқ„вҡЎ",
              "260": "вҳҒв”Ӯвҳ”вқ„", "270": "вҳҒв”Ӯвҳ”вқ„", "281": "вҳҒвҶ’вҳ”вқ„",
              
              "300": "вҳ”", "301": "вҳ”в”ӮвҳҖ", "302": "вҳ”в”ӮвҳҒ", "303": "вҳ”в”Ӯвқ„", "304": "вҳ”в”Ӯвқ„",
              "306": "вҳ”вҳ”", "308": "вҳ”рҹҢӘ", "309": "вҳ”в”Ӯвқ„", "311": "вҳ”вҶ’вҳҖ", "313": "вҳ”вҶ’вҳҒ",
              "314": "вҳ”вҶ’вқ„", "315": "вҳ”вҶ’вқ„", "316": "вҳ”вқ„вҶ’вҳҖ", "317": "вҳ”вқ„вҶ’вҳҒ", "320": "вҳ”вҶ’вҳҖ",
              "321": "вҳ”вҶ’вҳҒ", "322": "вҳ”в”Ӯвқ„", "323": "вҳ”вҶ’вҳҖ", "324": "вҳ”вҶ’вҳҖ", "325": "вҳ”вҶ’вҳҖ",
              "326": "вҳ”вҶ’вқ„", "327": "вҳ”вҶ’вқ„", "328": "вҳ”вҳ”", "329": "вҳ”вқ„", "340": "вҳ”в”Ӯвқ„",
              "350": "вҳ”вҡЎ", "361": "вҳ”вқ„вҶ’вҳҖ", "371": "вҳ”вқ„вҶ’вҳҒ",
              
              "400": "вқ„", "401": "вқ„в”ӮвҳҖ", "402": "вқ„в”ӮвҳҒ", "403": "вқ„в”Ӯвҳ”", "405": "вқ„вқ„",
              "406": "вқ„рҹҢӘ", "407": "вқ„рҹҢӘ", "409": "вқ„в”Ӯвҳ”", "411": "вқ„вҶ’вҳҖ", "413": "вқ„вҶ’вҳҒ",
              "414": "вқ„вҶ’вҳ”", "420": "вқ„вҶ’вҳҖ", "421": "вқ„вҶ’вҳҒ", "422": "вқ„вҶ’вҳ”", "423": "вқ„вҶ’вҳ”",
              "425": "вқ„вқ„", "426": "вқ„вҶ’вҳ”", "427": "вқ„в”Ӯвҳ”", "450": "вқ„вҡЎ"
          }

          def convert_weather_text_to_emoji(text):
              # гғһгғғгғ”гғігӮ°гҒ§зӣҙжҺҘзөөж–Үеӯ—еҢ–гҒ•гӮҢгҒҰгҒ„гӮӢгҒҹгӮҒгҖҒгҒқгҒ®гҒҫгҒҫиҝ”гҒҷ
              return text if text else "вҳҒ"

          def get_clothing_advice(temp):
              if temp is None: return "дёҚжҳҺпјҹ"
              if temp >= 30: return "пјҙгӮ·гғЈгғ„"
              elif temp >= 25: return "еҚҠиў–"
              elif temp >= 20: return "й•·иў–"
              elif temp >= 15: return "гӮёгғЈгӮұгғғгғҲ"
              elif temp >= 10: return "гӮігғјгғҲ"
              else: return "гғҖгӮҰгғі"

          def format_diff(diff_val):
              if diff_val is None: return "(?)"
              if diff_val > 0: return f"(+{diff_val})"
              elif diff_val < 0: return f"({diff_val})"
              else: return "(Вұ0)"

          try:
              jst = timezone(timedelta(hours=9))
              now_utc = datetime.now(timezone.utc)
              now = now_utc.astimezone(jst)
              current_hour = now.hour

              if current_hour < 7 or current_hour >= 22:
                  print(f"зҸҫеңЁгҒ®жҷӮеҲ»гҒҜ {now.strftime('%H:%M')} гҒ§гҒҷгҖӮ7жҷӮгҖң21жҷӮгҒ®жҷӮй–“еӨ–гҒ®гҒҹгӮҒе®ҹиЎҢгӮ’гӮ№гӮӯгғғгғ—гҒ—гҒҫгҒҷгҖӮ")
                  exit(0)

              try:
                  res = requests.get(JMA_FORECAST_URL, timeout=15).json()
              except (requests.exceptions.ConnectionError, requests.exceptions.Timeout) as e:
                  print(f"ж°—иұЎеәҒгӮөгғјгғҗгғјгҒёгҒ®жҺҘз¶ҡгҒҫгҒҹгҒҜеҗҚеүҚи§ЈжұәгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: {e}")
                  exit(0)

              if 17 <= current_hour <= 23:
                  is_tomorrow_data = True
                  label_head = "жҳҺж—Ҙ"
              else:
                  is_tomorrow_data = False
                  label_head = "д»Ҡж—Ҙ"
              day_idx = 1 if is_tomorrow_data else 0
              today_date_str = now.strftime("%Y-%m-%d")
              target_date_str = (now + timedelta(days=1)).strftime("%Y-%m-%d") if is_tomorrow_data else today_date_str

              current_hour_str = now.strftime("%Y-%m-%d-%H")
              cache_file = "last_run_hour.txt"
              history_file = "weather_history.json"
              if os.path.exists(cache_file):
                  with open(cache_file, "r") as f:
                      last_run_hour = f.read().strip()
                  if last_run_hour == current_hour_str:
                      print(f"гҒҷгҒ§гҒ«гҖҗ{now.strftime('%H:00')}жҷӮеҸ°гҖ‘гҒ®жңҖеҲқгҒ®е®ҹиЎҢгҒҜе®ҢдәҶгҒ—гҒҰгҒ„гҒҫгҒҷгҖӮ")
                      exit(0)

              base_series = res[0]['timeSeries'][0]
              weather_areas = base_series['areas']
              sapporo_weather = next((a for a in weather_areas if a['area']['code'] == '016010'), weather_areas[0])
              
              today_weather_code = sapporo_weather['weatherCodes'][day_idx]
              weather_plain_text = JMA_WEATHER_MAP.get(today_weather_code, "вҳҒ")
              weather_emoji_text = convert_weather_text_to_emoji(weather_plain_text)
              title_text = f"{label_head}жңӯе№ҢеёӮдёӯеӨ®еҢә{weather_emoji_text}"

              hourly_series = res[0]['timeSeries'][1]
              hourly_times_root = hourly_series['timeDefines']
              hourly_areas = hourly_series['areas']
              sapporo_hourly = next((a for a in hourly_areas if str(a['area']['code']).startswith("0160")), hourly_areas[0])
              
              hourly_pops = sapporo_hourly.get('pops', [])
              pop_times = hourly_times_root[-len(hourly_pops):] if hourly_pops else []

              day_pops = []
              for t_str, pop in zip(pop_times, hourly_pops):
                  dt_parsed = datetime.fromisoformat(t_str.replace("Z", "+00:00")).astimezone(jst)
                  if dt_parsed.strftime("%Y-%m-%d") == target_date_str and str(pop).strip() != "":
                      day_pops.append(int(pop))
              max_prob = max(day_pops) if day_pops else 0

              temp_series = res[0]['timeSeries'][2]
              temp_areas = temp_series['areas']
              sapporo_temp = next((a for a in temp_areas if str(a['area']['code']).startswith("0160")), temp_areas[0])
              temps = sapporo_temp['temps']
              tmin_raw = temps[2] if is_tomorrow_data and len(temps) >= 4 else (temps[0] if len(temps) > 0 else "14")
              tmax_raw = temps[3] if is_tomorrow_data and len(temps) >= 4 else (temps[1] if len(temps) > 1 else "25")

              if not is_tomorrow_data and (not tmin_raw or str(tmin_raw).strip() == "" or tmin_raw == tmax_raw):
                  try:
                      tmin_raw = res[1]['timeSeries'][1]['areas'][0]['tempsMin'][0]
                  except:
                      tmin_raw = "14"
              if not tmax_raw or str(tmax_raw).strip() == "": tmax_raw = "25"

              tmin_cleaned = str(tmin_raw).strip()
              tmax_cleaned = str(tmax_raw).strip()
              t_min_num = int(tmin_cleaned) if tmin_cleaned and tmin_cleaned.isdigit() else 14
              t_max_num = int(tmax_cleaned) if tmax_cleaned and tmax_cleaned.isdigit() else 25

              min_diff_str = "(?)"
              max_diff_str = "(?)"
              history_data = {}
              if os.path.exists(history_file):
                  try:
                      with open(history_file, "r") as f:
                          history_data = json.load(f)
                  except:
                      pass

              if is_tomorrow_data:
                  if today_date_str in history_data and isinstance(history_data[today_date_str], dict):
                      today_min = history_data[today_date_str].get("min")
                      today_max = history_data[today_date_str].get("max")
                      if today_min is not None: min_diff_str = format_diff(t_min_num - today_min)
                      if today_max is not None: max_diff_str = format_diff(t_max_num - today_max)
                  else:
                      try:
                          if len(temps) >= 4 and str(temps[0]).isdigit() and str(temps[1]).isdigit():
                              min_diff_str = format_diff(t_min_num - int(temps[0]))
                              max_diff_str = format_diff(t_max_num - int(temps[1]))
                      except:
                          pass
              else:
                  yesterday_str = (now - timedelta(days=1)).strftime("%Y-%m-%d")
                  if yesterday_str in history_data and isinstance(history_data[yesterday_str], dict):
                      yesterday_min = history_data[yesterday_str].get("min")
                      yesterday_max = history_data[yesterday_str].get("max")
                      if yesterday_min is not None: min_diff_str = format_diff(t_min_num - yesterday_min)
                      if yesterday_max is not None: max_diff_str = format_diff(t_max_num - yesterday_max)

              if target_date_str not in history_data or not isinstance(history_data[target_date_str], dict):
                  history_data[target_date_str] = {}
              history_data[target_date_str]["min"] = t_min_num
              history_data[target_date_str]["max"] = t_max_num

              if is_tomorrow_data and (today_date_str not in history_data or not isinstance(history_data[today_date_str], dict)):
                  if len(temps) >= 4 and str(temps[0]).isdigit() and str(temps[1]).isdigit():
                      history_data[today_date_str] = {"min": int(temps[0]), "max": int(temps[1])}

              def get_pop_data(target_hour_str):
                  pop_cache_key = f"pop-{target_date_str}-{target_hour_str}"
                  base_dt = now + timedelta(days=1) if is_tomorrow_data else now
                  target_dt = base_dt.replace(hour=int(target_hour_str), minute=0, second=0, microsecond=0)

                  matched_pop = None
                  if hourly_pops and pop_times:
                      best_diff = timedelta(days=1)
                      for t_str, pop in zip(pop_times, hourly_pops):
                          dt_parsed = datetime.fromisoformat(t_str.replace("Z", "+00:00")).astimezone(jst)
                          if dt_parsed <= target_dt:
                              diff = target_dt - dt_parsed
                              if diff < best_diff and diff < timedelta(hours=6) and str(pop).strip() != "":
                                  best_diff = diff
                                  matched_pop = int(pop)
                      
                      if matched_pop is not None:
                          history_data[pop_cache_key] = matched_pop
                          return matched_pop

                  return history_data.get(pop_cache_key, max_prob)

              forecast_lines = [f"жңҖдҪҺ:{t_min_num}В°C{min_diff_str} жңҖй«ҳ:{t_max_num}В°C{max_diff_str}"]
              
              hourly_slots = [
                  ("06", "06:00"), ("09", "09:00"), ("12", "12:00"),
                  ("15", "15:00"), ("18", "18:00"), ("21", "21:00")
              ]
              valid_rows_count = 0
              for hour_val, label in hourly_slots:
                  if valid_rows_count >= 4:
                      break
                  base_dt = now + timedelta(days=1) if is_tomorrow_data else now
                  target_dt = base_dt.replace(hour=int(hour_val), minute=0, second=0, microsecond=0)
                  if now > target_dt + timedelta(hours=2):
                      continue
                      
                  pop = get_pop_data(hour_val)
                  if hour_val == "06": temp = t_min_num + 1
                  elif hour_val == "09": temp = t_min_num + 4
                  elif hour_val == "12": temp = t_max_num - 2
                  elif hour_val == "15": temp = t_max_num - 1
                  elif hour_val == "18": temp = t_max_num - 4
                  else: temp = t_min_num + 2
                  
                  temp_str = f"{temp}В°C".rjust(5, " ")
                  pop_str = f"({pop}%)".rjust(6, " ")
                  advice_str = get_clothing_advice(temp)
                  
                  forecast_lines.append(f"{label} {temp_str} {pop_str} {advice_str}")
                  valid_rows_count += 1

              weather_message = "\n".join(forecast_lines)
              
              clean_history = {}
              for k, v in history_data.items():
                  if "pop-" in k:
                      clean_history[k] = v
                  elif k.count("-") == 2:
                      try:
                          if (now - datetime.strptime(k, "%Y-%m-%d").replace(tzinfo=jst)).days <= 3:
                              clean_history[k] = v
                      except:
                          pass
                          
              with open(history_file, "w") as f:
                  json.dump(clean_history, f)

              print("--- йҖҒдҝЎгғҮгғјгӮҝеҶ…е®№гғӯгӮ° ---")
              print(f"Title : {title_text}")
              print(f"Message:\n{weather_message}")
              
              headers = {
                  "Authorization": f"Bearer {API_KEY}",
                  "Content-Type": "application/json"
              }
              payload = {
                  "refreshNow": True,
                  "title": title_text,
                  "message": weather_message,
                  "styles": {
                      "title": { "fontFamily": "ChillRoundGothic", "fontSize": 24 },
                      "message": { "fontFamily": "ChillRoundGothic" }
                  }
              }
              try:
                  response = requests.post(DOT_API_URL, headers=headers, json=payload, timeout=15)
                  if response.status_code in [200, 201]:
                      print(f"жҲҗеҠҹ: {response.json().get('message')}")
                      with open(cache_file, "w") as f:
                          f.write(current_hour_str)
                  else:
                      print(f"APIгӮЁгғ©гғјзҷәз”ҹ (гӮ№гғҶгғјгӮҝгӮ№гӮігғјгғү: {response.status_code})")
                      exit(0)
              except (requests.exceptions.ConnectionError, requests.exceptions.Timeout) as e:
                  print(f"гғҚгғғгғҲгғҜгғјгӮҜгӮЁгғ©гғјгӮ’жӨңзҹҘ: {e}")
                  exit(0)

          except Exception as e:
              print(f"гӮ№гӮҜгғӘгғ—гғҲе®ҹиЎҢгӮЁгғ©гғј: {e}")
              exit(0)
          EOF
          python update_weather.py

      # 3. гӮӯгғЈгғғгӮ·гғҘгҒ®дҝқеӯҳпјҲv25гҒ«гӮўгғғгғ—гғҮгғјгғҲпјү
      - name: Save Run Hour and Temp Cache
        uses: actions/cache/save@v4
        if: success()
        with:
          path: |
            last_run_hour.txt
            weather_history.json
          key: weather-v2-cache-v25-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
