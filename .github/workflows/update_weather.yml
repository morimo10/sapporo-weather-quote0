name: update weather and clothing for dot v2 (pure jma hourly eco version)

on:
  schedule:
    # 日本時間 06:00〜23:59（UTC 20–23,0–11）の間に1時間に4回セットされた元のcron
    - cron: '17 0-10,21-23 * * *'
    - cron: '37 0-10,21-23 * * *'
    - cron: '47 0-10,21-23 * * *'
    - cron: '57 0-10,21-23 * * *'
  workflow_dispatch:

# 多重実行防止
concurrency:
  group: daytime-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 1. 前回の実行時間（時）が含まれるキャッシュを復元
    - name: Restore Last Run Hour and Temp Cache
      uses: actions/cache@v4
      with:
        path: |
          last_run_hour.txt
          weather_history.json
        # keyに一意のIDを入れることで、このワークフローの最後に必ず新しいキャッシュが保存されます
        key: weather-run-cache-${{ github.run_id }}-${{ github.run_attempt }}
        # 前回の最新キャッシュを部分一致で探し出して復元します
        restore-keys: |
          weather-run-cache-

    # 2. 同一時間帯（同じ「時」）の2回目以降の実行かチェック
    - name: Check duplication in the same hour
      id: check-hour
      run: |
        CURRENT_HOUR=$(date +%H)
        echo "Current UTC Hour: $CURRENT_HOUR"

        if [ -f last_run_hour.txt ] && [ "$(cat last_run_hour.txt)" = "$CURRENT_HOUR" ]; then
          echo "Already executed in this hour. Skipping next steps."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "First execution in this hour. Proceeding."
          echo "$CURRENT_HOUR" > last_run_hour.txt
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    # --- 3. メインの処理ステップ（同じ時間帯の2回目以降ならスキップ） ---
    # ※実際の実行コマンドやスクリプト（python や node、shなど）に合わせて書き換えてください。
    - name: Run Weather Update Script
      if: steps.check-hour.outputs.skip != 'true'
      run: |
        echo "ここで天気と服装の更新処理（メイン処理）を実行します"
        # 例: python update.py
