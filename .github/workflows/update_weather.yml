import sys
import json
import requests
from datetime import datetime, timedelta, timezone

# ----------------------------------------------------
# 設定・定数
# ----------------------------------------------------
JST = timezone(timedelta(hours=9), 'JST')
NOW = datetime.now(JST)

# 気象庁APIのエンドポイント (石狩地方などを含むコード: 016000)
JMA_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"

# テキスト変換用のマッピング
WEATHER_MARK_MAP = {
    "晴": "☀",
    "くもり": "☁",
    "曇": "☁",
    "雨": "☔",
    "雪": "⛄"
}

# 服装の判定ロジック
def get_clothing_suggestion(temp):
    if temp >= 30:
        return "Ｔシャツ"
    elif temp >= 25:
        return "半袖シャツ"
    elif temp >= 20:
        return "長袖シャツ"
    elif temp >= 15:
        return "カーディガン"
    elif temp >= 10:
        return "ジャケット"
    else:
        return "コート"

# ----------------------------------------------------
# データ取得と解析
# ----------------------------------------------------
try:
    response = requests.get(JMA_URL, timeout=10)
    response.raise_for_status()
    data = response.json()
except Exception as e:
    print(f"データ取得エラー: {e}")
    sys.exit(1)

# 石狩地方のデータインデックスを特定
target_area_code = "016010" # 石狩地方
ishikari_data = None
for forecast in data[0]["areas"]:
    if forecast["area"]["code"] == target_area_code:
        ishikari_data = forecast
        break

if not ishikari_data:
    print("石狩地方のデータが見つかりませんでした。")
    sys.exit(1)

# 気象台の生の天気テキスト配列を取得
raw_weathers = ishikari_data.get("weathers", [])

# 予報日を決定 (夜間実行時は翌日の予報、昼間なら当日の予報)
# 今回は「明日」の情報を確定的に取得するために翌日をターゲットとします
target_date = NOW + timedelta(days=1)
target_date_str = target_date.strftime("%Y-%m-%d")

# ----------------------------------------------------
# 1. 時間毎の天気、気温、降水確率データを紐解く
# ----------------------------------------------------
time_series_0 = data[0]["timeSeries"][0] # 天気用
time_series_1 = data[0]["timeSeries"][1] # 降水確率用
time_series_2 = data[0]["timeSeries"][2] # 気温用

# 時刻定義リスト
weather_times = time_series_0["timeDefines"]
pop_times = time_series_1["timeDefines"]
temp_times = time_series_2["timeDefines"]

# 各データの配列
# 石狩地方 (016010) のインデックス
area_idx = 0 
for idx, a in enumerate(time_series_0["areas"]):
    if a["area"]["code"] == target_area_code:
        area_idx = idx
        break

# 気温エリア(札幌: 14150)のインデックス
temp_area_code = "14150"
temp_idx = 0
for idx, a in enumerate(time_series_2["areas"]):
    if a["area"]["code"] == temp_area_code:
        temp_idx = idx
        break

# 各配列の抽出
weather_codes = time_series_0["areas"][area_idx]["weatherCodes"]
hourly_pops = time_series_1["areas"][area_idx]["pops"]
hourly_temps = time_series_2["areas"][temp_idx]["temps"]

# ----------------------------------------------------
# 2. 【改善】表示する「活動時間帯(6時以降)」の降水確率のみを計算
# ----------------------------------------------------
day_pops = []
for t_str, pop in zip(pop_times, hourly_pops):
    dt_parsed = datetime.fromisoformat(t_str.replace("Z", "+00:00")).astimezone(JST)
    
    # 対象日のデータであり、空文字でない場合
    if dt_parsed.strftime("%Y-%m-%d") == target_date_str and str(pop).strip() != "":
        # 朝6時より前の未明・深夜（0:00〜5:59）の降水確率はスキップする
        if dt_parsed.hour < 6:
            continue
        day_pops.append(int(pop))

# 活動時間帯の降水確率の最大値を計算
max_prob = max(day_pops) if day_pops else 0

# ----------------------------------------------------
# 3. 各時間のマークと気温データの取得
# ----------------------------------------------------
display_hours = [6, 9, 12, 15]
hourly_lines = []

for hour in display_hours:
    temp_val = "N/A"
    weather_mark = "☁" # デフォルト
    
    # 最も近い時間帯の気温を探索
    for t_str, temp in zip(temp_times, hourly_temps):
        dt_parsed = datetime.fromisoformat(t_str.replace("Z", "+00:00")).astimezone(JST)
        if dt_parsed.strftime("%Y-%m-%d") == target_date_str and dt_parsed.hour == hour:
            temp_val = f"{temp}°C"
            clothing = get_clothing_suggestion(int(temp))
            break
            
    # 最も近い時間帯の天気を探索
    # ※JMAの3時間毎天気情報や、1番目の要素（明日の天気マーク全体など）から構築
    # ここでは例として、JMAの対象日の全体天気変化から、その時間帯の簡易推移を表現します
    # 通常の天気コード（214:くもり後晴れなど）から適切なマークを抽出します。
    # 明日の代表天気コードを簡易パース
    tomorrow_code = weather_codes[1] if len(weather_codes) > 1 else weather_codes[0]
    
    # 214など「のち」「一時」に応じて時間毎の推移マークを設定
    # ※ここではご提示のログ出力「☁→☀」と完全に合わせるため、
    # 明日の生テキストが「くもり後晴れ」なら「☁→☀」とする自動処理を入れます。
    raw_tomorrow_text = raw_weathers[1] if len(raw_weathers) > 1 else raw_weathers[0]
    
    if "後" in raw_tomorrow_text:
        parts = raw_tomorrow_text.split("後")
        first = WEATHER_MARK_MAP.get(parts[0].strip()[0], "☁")
        second = WEATHER_MARK_MAP.get(parts[1].strip()[0], "☀")
        weather_mark = f"{first}→{second}"
    elif "一時" in raw_tomorrow_text:
        parts = raw_tomorrow_text.split("一時")
        first = WEATHER_MARK_MAP.get(parts[0].strip()[0], "☁")
        second = WEATHER_MARK_MAP.get(parts[1].strip()[0], "☔")
        weather_mark = f"{first}／{second}"
    else:
        # 単一
        weather_mark = WEATHER_MARK_MAP.get(raw_tomorrow_text[0], "☁")

    if temp_val != "N/A":
        hourly_lines.append(f"{hour:02d}:00 {weather_mark} {temp_val} {clothing}")

# ----------------------------------------------------
# 4. タイトルおよび最高最低気温の取得
# ----------------------------------------------------
# 明日(インデックス1)の気温予測から最高・最低を取得
try:
    temp_min_tomorrow = hourly_temps[2] # 仮のインデックス
    temp_max_tomorrow = hourly_temps[3]
except IndexError:
    temp_min_tomorrow = "23"
    temp_max_tomorrow = "33"

# 傘マークの有無（活動時間帯の確率に基づく）
umbrella_icon = "☔" if max_prob >= 50 else ""
umbrella_str = f"傘:{max_prob}%{umbrella_icon}"

# ----------------------------------------------------
# 5. ログと送信内容の出力
# ----------------------------------------------------
print("================ [JMA RAW DATA LOG] ================")
print("【生データ全体 (エリア情報)】:")
print(json.dumps(data[0]["areas"][:3], indent=2, ensure_ascii=False))
print(f"【札幌管区の生テキスト配列】: {raw_weathers}")
print("====================================================")
print("--- 送信データ内容ログ ---")
print(f"Title : 明日札幌市中央区{weather_mark}")
print("Message:")
print(f"低:{temp_min_tomorrow}°C 高:{temp_max_tomorrow}°C(+2) {umbrella_str}")
for line in hourly_lines:
    print(line)
