name: Update Weather and Clothing for Dot V2 (Pure JMA Complete Hybrid v3)

on:
  schedule:
    # 30分ごとに自動実行
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 気象庁モデル(jma_seamless)から、必要なデータを純度100%で同時リクエスト（1日の代表天気コードを追加）
        OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.0620&longitude=141.3540&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&models=jma_seamless"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(code):
            if code is None: return "⛅"
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp is None: return " 調整着"
            if temp >= 30.0: return " Tシャツ"
            elif temp >= 25.0: return " 半袖"
            elif temp >= 20.0: return " 長袖"
            elif temp >= 15.0: return " セーター"
            elif temp >= 10.0: return " ジャケット"
            elif temp >= 5.0: return " コート"
            else: return " ダウン"

        def get_umbrella_advice(prob):
            if prob is None: return ""
            if prob >= 50:
                return " ☔"
            elif prob >= 30:
                return " 🌂"
            return ""

        try:
            response_weather = requests.get(OPEN_METEO_URL)
            res = response_weather.json()
            
            if 'hourly' not in res or 'daily' not in res:
                print(f"APIレスポンスエラー: {res}")
                exit(1)
                
            hourly = res['hourly']
            daily = res['daily']
            h_time_strings = hourly.get('time', [])
            
            # 気象庁のデータのみを正確に抽出
            h_temp = hourly.get('temperature_2m_jma_seamless', hourly.get('temperature_2m', []))
            h_code = hourly.get('weather_code_jma_seamless', hourly.get('weather_code', []))
            
            d_code = daily.get('weather_code_jma_seamless', daily.get('weather_code', []))
            d_prob = daily.get('precipitation_probability_max_jma_seamless', daily.get('precipitation_probability_max', []))
            d_tmax = daily.get('temperature_2m_max_jma_seamless', daily.get('temperature_2m_max', []))
            d_tmin = daily.get('temperature_2m_min_jma_seamless', daily.get('temperature_2m_min', []))
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            # 夜21時以降は「明日」の予報に切り替え
            is_tomorrow = now.hour >= 21
            target_date = now if not is_tomorrow else now + timedelta(days=1)
            day_idx = 1 if is_tomorrow else 0
            
            # 1日全体の天気絵文字を取得
            day_code_val = d_code[day_idx] if d_code and day_idx < len(d_code) else None
            day_emoji = get_weather_emoji(day_code_val)
            
            # 【変更点】タイトルの最後に「: 天気絵文字」を表示
            title_text = f"札幌市中央区の天気: {day_emoji}"
            
            # 気象庁公式の各種1日データを取得
            prob_val = d_prob[day_idx] if d_prob and day_idx < len(d_prob) else None
            tmax_val = d_tmax[day_idx] if d_tmax and day_idx < len(d_tmax) else None
            tmin_val = d_tmin[day_idx] if d_tmin and day_idx < len(d_tmin) else None
            
            prob_str = f"{int(prob_val)}%" if prob_val is not None else "0%"
            umbrella_mark = get_umbrella_advice(prob_val)
            
            tmax_str = f"{round(tmax_val)}°C" if tmax_val is not None else "?°C"
            tmin_str = f"{round(tmin_val)}°C" if tmin_val is not None else "?°C"
            
            label_head = "明日" if is_tomorrow else "今日"
            
            forecast_lines = [
                f"{label_head}の最大降水確率：{prob_str}{umbrella_mark}",
                f"最低: {tmin_str}  最高: {tmax_str}"
            ]
            
            # 朝・昼・夜のタイムライン（6時、12時、18時）
            slots = [
                ("朝(06:00)", 6),
                ("昼(12:00)", 12),
                ("夜(18:00)", 18)
            ]
            
            for label, hour in slots:
                target_dt = target_date.replace(hour=hour, minute=0, second=0, microsecond=0)
                target_time_str = target_dt.strftime("%Y-%m-%dT%H:%M")
                
                idx = -1
                if target_time_str in h_time_strings:
                    idx = h_time_strings.index(target_time_str)
                
                raw_temp = h_temp[idx] if (idx != -1 and idx < len(h_temp)) else None
                raw_code = h_code[idx] if (idx != -1 and idx < len(h_code)) else None
                
                if raw_temp is not None:
                    temp_num = round(raw_temp)
                    temp_display = f"{temp_num}°C"
                    clothing = get_clothing_advice(temp_num)
                else:
                    temp_display = "?°C"
                    clothing = get_clothing_advice(None)
                
                emoji = get_weather_emoji(raw_code)
                temp_aligned = temp_display.rjust(5)
                
                forecast_lines.append(f"{label} {emoji} {temp_aligned}{clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（タイトル天気絵文字追加版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
