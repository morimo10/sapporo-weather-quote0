name: Update Weather and Clothing for Dot V2 (JMA Official 2h 5Rows)

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 気象庁が一般公開している、高解像度の最新時系列データ（016000 = 札幌・石狩地方）
        # 外部の個人APIを一切挟まないため、将来終了するリスクがありません。
        JMA_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(text):
            if "晴" in text: return "☀️"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "❄️"
            elif "雷" in text: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp >= 25.0: return "半袖シャツ"
            elif temp >= 20.0: return "長袖シャツ"
            elif temp >= 16.0: return "カーディガン"
            elif temp >= 12.0: return "セーター"
            elif temp >= 8.0: return "トレンチコート"
            elif temp >= 5.0: return "冬物コート"
            else: return "ダウンコート"

        try:
            # 1. 気象庁公式生データを取得
            res = requests.get(JMA_URL).json()
            time_series_list = res[0]['timeSeries']
            
            # 安全なフォールバック用初期値
            max_temp_today, min_temp_today = 26, 15
            time_strings, temps, probs, weathers = [], [], [], []

            # 2. 気象庁の特殊な「入れ子構造」をブロックの名前ベースで完璧に自動解析
            for ts in time_series_list:
                areas = ts.get('areas', [])
                sap_area = next((a for a in areas if a['area']['name'] == "札幌"), None)
                if not sap_area: continue
                
                # 3時間〜1時間単位の細かい時系列データブロック
                if 'temps' in sap_area and len(ts.get('timeDefines', [])) > 3:
                    time_strings = ts['timeDefines']
                    temps = [int(t) for t in sap_area['temps']]
                elif 'pops' in sap_area:
                    probs = [int(p) for p in sap_area['pops']]
                elif 'weathers' in sap_area:
                    weathers = sap_area['weathers']

            # 最高・最低気温を別の今日明日予報ブロックから安全に抽出
            try:
                for ts in time_series_list:
                    areas = ts.get('areas', [])
                    sap_area = next((a for a in areas if a['area']['name'] == "札幌"), None)
                    if sap_area and 'temps' in sap_area and len(ts.get('timeDefines', [])) <= 3:
                        daily_temps = [int(t) for t in sap_area['temps'] if t.replace('-','').isdigit()]
                        if len(daily_temps) >= 2:
                            min_temp_today, max_temp_today = sorted([daily_temps[0], daily_temps[1]])
            except:
                pass

            title_text = f"札幌市中央区 {max_temp_today}℃〜{min_temp_today}℃"

            # 配列の長さ不足を防ぐ安全処理
            if not probs: probs = [0] * len(temps)
            if not weathers: weathers = ["晴れ"] * len(temps)

            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            forecast_lines = []
            
            # 3. 現在時刻以降のインデックス（位置）を特定
            times_parsed = [datetime.fromisoformat(t).replace(tzinfo=jst) for t in time_strings]
            current_idx = min(range(len(times_parsed)), key=lambda i: abs(times_parsed[i] - now))
            
            # 【ご要望：2時間単位】
            # 現在から「+0時間、+2時間、+4時間、+6時間、+8時間」の位置を正確に狙い撃ち
            # 気象庁のデータは基本3時間刻み（時間帯により1時間刻み）のため、一番近い時間を自動選択
            target_indices = []
            base_time = times_parsed[current_idx]
            
            for offset_hours in [0, 2, 4, 6, 8]:
                target_time = base_time + timedelta(hours=offset_hours)
                idx = min(range(len(times_parsed)), key=lambda i: abs(times_parsed[i] - target_time))
                if idx not in target_indices and idx < len(temps):
                    target_indices.append(idx)
            
            # 5行に満たない場合は、後ろの時間を追加して必ず5行にする
            idx_append = target_indices[-1] + 1 if target_indices else current_idx
            while len(target_indices) < 5 and idx_append < len(temps):
                if idx_append not in target_indices:
                    target_indices.append(idx_append)
                idx_append += 1

            # 4. 2時間刻みの5行分データを美しく成形
            for idx in target_indices[:5]:
                t_jma = times_parsed[idx]
                t_str = t_jma.strftime("%H:%M")
                
                temp_val = temps[idx]
                prob_val = probs[idx] if idx < len(probs) else probs[-1]
                weather_text = weathers[idx if idx < len(weathers) else 0]
                
                emoji = get_weather_emoji(weather_text)
                clothing = get_clothing_advice(temp_val)
                
                temp_str = f"{temp_val}°C"
                prob_str = f"{prob_val}%"
                temp_aligned = temp_str.rjust(5)
                prob_aligned = prob_str.rjust(4)
                
                forecast_lines.append(f"{t_str} {emoji} {temp_aligned} {prob_aligned} {clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（気象庁公式・永久機関2h版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生: {response.status_code}")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
