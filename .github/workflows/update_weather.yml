name: Update Weather and Clothing for Dot V2 (JMA Official 5Rows)

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        # GitHub Secretsから安全に読み込み
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 1. 気象庁公式のデータ配信サーバーから直接取得（016000 = 石狩・空知・後志地方 / 札幌）
        JMA_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(text):
            if "晴" in text: return "☀️"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "❄️"
            elif "雷" in text: return "⚡"
            return "⛅" # くもり、その他

        def get_clothing_advice(temp):
            if temp >= 25.0: return "半袖シャツ"
            elif temp >= 20.0: return "長袖シャツ"
            elif temp >= 16.0: return "カーディガン"
            elif temp >= 12.0: return "セーター"
            elif temp >= 8.0: return "トレンチコート"
            elif temp >= 5.0: return "冬物コート"
            else: return "ダウンコート"

        try:
            # 気象庁からデータを取得
            res = requests.get(JMA_URL).json()
            
            # 各データの抽出（気象庁特有のネスト構造の解析）
            # [0]が今日・明日予報のブロック
            time_series_list = res[0]['timeSeries']
            
            # --- 最高・最低気温の取得 (2つ目のtimeSeriesブロックに地域全体の気温が入る) ---
            # 札幌エリアのインデックスを探索
            temp_area_idx = 0
            for i, area in enumerate(time_series_list[2]['areas']):
                if area['area']['name'] == "札幌":
                    temp_area_idx = i
                    break
            
            # 今日と明日の確定気温リスト
            daily_temps = time_series_list[2]['areas'][temp_area_idx]['temps']
            max_temp_today = int(daily_temps[1]) if len(daily_temps) > 1 else int(daily_temps[0])
            min_temp_today = int(daily_temps[0]) # 最低気温
            
            # もし最低気温と最高気温のデータが反転、または不足している場合の調整
            if min_temp_today > max_temp_today:
                max_temp_today, min_temp_today = min_temp_today, max_temp_today
                
            title_text = f"札幌市中央区 {max_temp_today}℃〜{min_temp_today}℃"
            
            # --- 3時間ごとの時系列予報の取得 (3つ目のtimeSeriesブロック) ---
            hourly_block = time_series_list[1]
            time_strings = hourly_block['timeDefines']
            
            hourly_area_idx = 0
            for i, area in enumerate(hourly_block['areas']):
                if area['area']['name'] == "札幌":
                    hourly_area_idx = i
                    break
                    
            target_area = hourly_block['areas'][hourly_area_idx]
            weathers = target_area.get('weathers', target_area.get('weatherCodes', []))
            temps = target_area['temps']
            # 気象庁の3時間予報に降水確率がない時間帯は0%でフォールバック
            probs = target_area.get('pops', ['0'] * len(temps)) 
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            forecast_lines = []
            count = 0
            
            # 現在時刻以降のデータを、気象庁の配信データ（最大24コマ）から順番に5行分探す
            for i in range(len(time_strings)):
                t_jma = datetime.fromisoformat(time_strings[i]).replace(tzinfo=jst)
                
                # すでに過ぎ去った過去の時間（1時間半以上前）はスキップして前に詰める
                if t_jma < now - timedelta(hours=1, minutes=30):
                    continue
                    
                t_str = t_jma.strftime("%H:%M")
                temp_val = int(temps[i])
                prob_val = int(probs[i]) if i < len(probs) else 0
                weather_text = weathers[i] if i < len(weathers) else "晴"
                
                emoji = get_weather_emoji(weather_text)
                clothing = get_clothing_advice(temp_val)
                
                temp_str = f"{temp_val}°C"
                prob_str = f"{prob_val}%"
                temp_aligned = temp_str.rjust(5)
                prob_aligned = prob_str.rjust(4)
                
                forecast_lines.append(f"{t_str} {emoji} {temp_aligned} {prob_aligned} {clothing}")
                count += 1
                if count >= 5: # デバイスの余白を埋めるため「5行分」きっちり取得
                    break
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（気象庁公式・3h×5行確定版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
