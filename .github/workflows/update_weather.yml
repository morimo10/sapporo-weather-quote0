name: Update Weather and Clothing for Quote/0 V2

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Quote/0 V2 API
      env:
        # GitHub SecretsからAPIキーとデバイスIDを安全に読み込む
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import requests
        from datetime import datetime, timedelta, timezone

        # 1. 環境変数の取得
        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 2. 札幌の座標（気象庁 JMAモデル指定）
        OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.0621&longitude=141.3544&hourly=temperature_2m,precipitation_probability,weather_code&timezone=Asia%2FTokyo&models=jma"
        
        # 新しいV2エンドポイントURL（デバイスIDをURLに埋め込み）
        QUOTE0_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        # 天気コード（WMO）を絵文字にマッピング
        def get_weather_emoji(code):
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "❓"

        # 気温に応じた衣類・服装情報の判定ロジック
        def get_clothing_advice(temp):
            if temp >= 25.0:
                return "半袖シャツ"
            elif temp >= 20.0:
                return "長袖シャツ"
            elif temp >= 16.0:
                return "カーディガン"
            elif temp >= 12.0:
                return "セーター"
            elif temp >= 8.0:
                return "トレンチコート"
            elif temp >= 5.0:
                return "冬物コート"
            else:
                return "ダウンコート"

        try:
            # Open-Meteo APIから最新の気象データを取得
            res = requests.get(OPEN_METEO_URL).json()
            hourly = res['hourly']
            
            # 日本時間 (JST) の現在時刻を取得
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            # 取得データの時間軸をJSTに変換
            times = [datetime.fromisoformat(t).replace(tzinfo=jst) for t in hourly['time']]
            
            # 現在時刻に一番近いデータのインデックスを検索
            current_idx = min(range(len(times)), key=lambda i: abs(times[i] - now))
            
            # 「現在」「3時間後」「6時間後」のインデックスを指定
            target_indices = [current_idx, current_idx + 3, current_idx + 6]
            
            forecast_lines = []
            
            # 3回ループして指定時間ごとのデータを成形
            for idx in target_indices:
                if idx < len(times):
                    t = times[idx].strftime("%H:%M")
                    temp = f"{hourly['temperature_2m'][idx]}°C"
                    prob = f"{hourly['precipitation_probability'][idx]}%"
                    code = hourly['weather_code'][idx]
                    
                    emoji = get_weather_emoji(code)
                    clothing = get_clothing_advice(hourly['temperature_2m'][idx])
                    
                    # 各項目の「左側の開始位置」を縦に揃えるためのフォーマット (左寄せ)
                    forecast_lines.append(f"{t} {emoji} {temp:<7} {prob:<5} {clothing}")
            
            # 予報本文を改行で結合
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ ---")
            print(f"Title  : 札幌市")
            print(f"Message:\n{weather_message}")
            print("------------------------")

            # 3. 新仕様（V2）に従ってヘッダーとパラメータを構築
            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            
            # ドキュメントに指定されたリクエスト構造（title, message, refreshNowなど）
            payload = {
                "title": "札幌市",
                "message": weather_message,
                "refreshNow": True  # デバイスへ即時更新をかけるフラグ
            }
            
            # 新しいURLへ送信
            response = requests.post(QUOTE0_API_URL, headers=headers, json=payload)
            
            if response.status_code in [200, 201]:
                print("Quote/0 V2 APIの更新に成功しました！")
            else:
                print(f"Quote/0 V2 APIエラー: {response.status_code} - {response.text}")
                exit(1)

        except Exception as e:
            print(f"Error: {e}")
            exit(1)
        EOF
