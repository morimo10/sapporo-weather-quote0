name: Update Weather and Clothing for Dot V2 (Yahoo Weather Robust)

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Generate and Push to Dot API
      env:
        # GitHub Secretsから安全に読み込み
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from bs4 import BeautifulSoup
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 1. Yahoo!天気：札幌市中央区のピンポイント予報ページURL
        YAHOO_WEATHER_URL = "https://weather.yahoo.co.jp/weather/jp/1b/1400/1101.html"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(text):
            if "晴" in text: return "☀️"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "❄️"
            elif "雷" in text: return "⚡"
            elif "霧" in text: return "🌫️"
            return "⛅" # 曇り、くもり、その他はすべてデフォルトで⛅

        def get_clothing_advice(temp):
            if temp >= 25: return "半袖シャツ"
            elif temp >= 20: return "長袖シャツ"
            elif temp >= 16: return "カーディガン"
            elif temp >= 12: return "セーター"
            elif temp >= 8: return "トレンチコート"
            elif temp >= 5: return "冬物コート"
            else: return "ダウンコート"

        try:
            headers_browser = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
            response_html = requests.get(YAHOO_WEATHER_URL, headers=headers_browser)
            response_html.encoding = 'utf-8'
            soup = BeautifulSoup(response_html.text, "html.parser")
            
            # --- 最高気温・最低気温の抽出 ---
            parent_div = soup.find("div", id="main") or soup.find("div", class_="main-column")
            high_box = parent_div.find("em", class_="high")
            low_box = parent_div.find("em", class_="low")
            max_temp = int(high_box.text) if high_box and high_box.text.replace("-","").isdigit() else 20
            min_temp = int(low_box.text) if low_box and low_box.text.replace("-","").isdigit() else 10
            
            title_text = f"札幌市中央区 {max_temp}℃〜{min_temp}℃"
            
            # --- 【重要】HTML構造に基づく精密なデータ抽出 ---
            # 「項目名」に惑わされず、セルの持つ固有のフォントクラスからダイレクトに配列を作ります
            hours_data = [td.text.strip() for td in soup.find_all("td", class_="yjw_item_3hour")]
            weather_data = [img["alt"].strip() for img in soup.find_all("td", class_="yjw_weather_3hour") if img.find("img")]
            if not weather_data: # 万が一imgのaltから取れない場合のセーフティ
                weather_data = [td.text.strip() for td in soup.find_all("td", class_="yjw_weather_3hour")]
                
            temp_data = []
            for td in soup.find_all("td", class_="yjw_temp_3hour"):
                num = "".join(filter(lambda c: c.isdigit() or c == "-", td.text.strip()))
                if num: temp_data.append(int(num))
                
            prob_data = [td.text.strip() for td in soup.find_all("td", class_="yjw_precip_3hour")]

            # 現在時刻に最も近いインデックスの算出
            jst = timezone(timedelta(hours=9))
            current_hour = datetime.now(jst).hour
            time_slots = [0, 3, 6, 9, 12, 15, 18, 21]
            closest_slot = min(time_slots, key=lambda x: abs(x - current_hour))
            current_idx = time_slots.index(closest_slot)
            
            # 本日のデータ配列（最大8個）を超えないようにスライスガード
            target_indices = [current_idx, current_idx + 1, current_idx + 2]
            forecast_lines = []
            
            for idx in target_indices:
                if idx < len(hours_data) and idx < len(temp_data) and idx < len(weather_data):
                    # 時間を「XX:00」に整形
                    raw_hour = "".join(filter(str.isdigit, hours_data[idx]))
                    time_str = raw_hour.zfill(2) + ":00"
                    
                    weather_text = weather_data[idx]
                    temp_val = temp_data[idx]
                    prob_val = prob_data[idx]
                    
                    if "%" not in prob_val:
                        prob_val = f"{prob_val}%"
                    
                    emoji = get_weather_emoji(weather_text)
                    clothing = get_clothing_advice(temp_val)
                    
                    # 確実に右寄せ幅を固定（気温5幅、確率4幅）
                    temp_str = f"{temp_val}°C"
                    temp_aligned = temp_str.rjust(5)
                    prob_aligned = prob_val.rjust(4)
                    
                    forecast_lines.append(f"{time_str} {emoji} {temp_aligned} {prob_aligned} {clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（完全版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("-----------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
