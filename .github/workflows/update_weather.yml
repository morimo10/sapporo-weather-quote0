name: Update Weather and Clothing for Dot V2 (Strict Time Match)

on:
  schedule:
    # 30分ごとに自動実行
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast?latitude=43.0620&longitude=141.3540&hourly=temperature_2m,precipitation_probability,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(code):
            if code is None: return "⛅"
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp is None: return " 調整着"
            if temp >= 30.0: return " Tシャツ"
            elif temp >= 25.0: return " 半袖"
            elif temp >= 20.0: return " 長袖"
            elif temp >= 15.0: return " セーター"
            elif temp >= 10.0: return " ジャケット"
            elif temp >= 5.0: return " コート"
            else: return " ダウン"

        try:
            response_weather = requests.get(OPEN_METEO_URL)
            res = response_weather.json()
            
            if 'hourly' not in res or 'daily' not in res:
                print(f"APIレスポンスエラー: {res}")
                exit(1)
                
            hourly = res['hourly']
            daily = res['daily']
            
            h_time_strings = hourly.get('time', []) # "2026-06-17T16:00" のような文字列の配列
            h_temp = hourly.get('temperature_2m', [])
            h_prob = hourly.get('precipitation_probability', [])
            h_code = hourly.get('weather_code', [])
            
            d_max = daily.get('temperature_2m_max', [])
            d_min = daily.get('temperature_2m_min', [])
            
            max_val = d_max[0] if d_max and len(d_max) > 0 else None
            min_val = d_min[0] if d_min and len(d_min) > 0 else None
            
            max_str = f"{round(max_val)}" if max_val is not None else "?"
            min_str = f"{round(min_val)}" if min_val is not None else "?"
            
            title_text = f"札幌市中央区 {max_str}〜{min_str}℃"
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            # 【修正】起点となる時間の決定ロジックをシンプルに
            base_hour = now.hour if now.hour % 2 == 0 else now.hour - 1
            start_time = now.replace(hour=base_hour, minute=0, second=0, microsecond=0)
            
            # もし起点時間が現在より1時間半以上古ければ、次の偶数時間にする
            if now - start_time > timedelta(hours=1, minutes=30):
                start_time += timedelta(hours=2)
            
            forecast_lines = []
            
            # 5行（2時間刻み）の予報を生成
            for i in range(5):
                target_dt = start_time + timedelta(hours=i * 2)
                
                # APIが探しやすい形式のフォーマット文字列を作る (例: "2026-06-17T16:00")
                target_time_str = target_dt.strftime("%Y-%m-%dT%H:%M")
                display_time_str = target_dt.strftime("%H:%M")
                
                # --- 【超重要修正】指定した日時の文字列と完全に一致するインデックスを検索 ---
                idx = -1
                if target_time_str in h_time_strings:
                    idx = h_time_strings.index(target_time_str)
                
                # 万が一完全一致が見つからない場合のみ、一番近いところを検索（バックアップ）
                if idx == -1:
                    times_parsed = [datetime.fromisoformat(t).replace(tzinfo=jst) for t in h_time_strings]
                    idx = min(range(len(times_parsed)), key=lambda k: abs(times_parsed[k] - target_dt.replace(tzinfo=jst)))
                
                # データの抽出
                raw_temp = h_temp[idx] if idx < len(h_temp) else None
                raw_prob = h_prob[idx] if idx < len(h_prob) else None
                raw_code = h_code[idx] if idx < len(h_code) else None
                
                # 気温・服装
                if raw_temp is not None:
                    temp_num = round(raw_temp)
                    temp_display = f"{temp_num}°C"
                    clothing = get_clothing_advice(temp_num)
                else:
                    temp_display = "?°C"
                    clothing = get_clothing_advice(None)
                
                # 降水確率
                if raw_prob is not None:
                    prob_num = int(raw_prob)
                    prob_display = f"{prob_num}%"
                else:
                    prob_display = "?%"
                
                emoji = get_weather_emoji(raw_code)
                
                temp_aligned = temp_display.rjust(5)
                prob_aligned = prob_display.rjust(4)
                
                # 完全に一致した時間のデータだけで1行を作る
                forecast_lines.append(f"{display_time_str} {emoji} {temp_aligned} {prob_aligned}{clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（インデックス完全一致版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
