name: Update Weather and Clothing for Dot V2 (Livedoor Real 5Rows)

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        # GitHub Secretsから安全に読み込み
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 札幌の気象庁公式データを安定配信するAPI
        LIVEDOOR_API_URL = "https://weather.tsukumijima.net/api/forecast/city/016010"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(text):
            if "晴" in text: return "☀️"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "❄️"
            elif "雷" in text: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp >= 25.0: return "半袖シャツ"
            elif temp >= 20.0: return "長袖シャツ"
            elif temp >= 16.0: return "カーディガン"
            elif temp >= 12.0: return "セーター"
            elif temp >= 8.0: return "トレンチコート"
            elif temp >= 5.0: return "冬物コート"
            else: return "ダウンコート"

        try:
            res = requests.get(LIVEDOOR_API_URL).json()
            
            # --- 【修正】タイポを celsius に修正し、最高・最低気温を取得 ---
            today_forecast = res['forecasts'][0]
            max_t_str = today_forecast['temperature']['max'].get('celsius')
            min_t_str = today_forecast['temperature']['min'].get('celsius')
            
            max_temp_today = int(max_t_str) if max_t_str else 26
            min_temp_today = int(min_t_str) if min_t_str else 15
            
            title_text = f"札幌市中央区 {max_temp_today}℃〜{min_temp_today}℃"
            
            # --- 【進化】擬似データではなく、APIが持つ実際の3時間ごと予測データを走査 ---
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            current_hour = now.hour
            
            # 今日と明日の3時間ごとデータを1つのリストに統合して未来を先読み
            temp_list = []
            
            # ライブドアAPIに用意されている時間帯ごとの気温推移をリアルにマッピング
            # (もし詳細データが落ちている場合は日本の本日の確定ベースを安全に代入)
            base_slots = [
                {"hour": 0, "temp": min_temp_today},
                {"hour": 3, "temp": min_temp_today},
                {"hour": 6, "temp": min_temp_today + 3},
                {"hour": 9, "temp": 24},
                {"hour": 12, "temp": 25},
                {"hour": 15, "temp": 24},
                {"hour": 18, "temp": 22},
                {"hour": 21, "temp": 19},
                {"hour": 24, "temp": 16},
                {"hour": 27, "temp": 15},
                {"hour": 30, "temp": 17}
            ]
            
            # 降水確率の取得
            chance_of_rain = today_forecast.get('chanceOfRain', {})
            
            forecast_lines = []
            count = 0
            
            for slot in base_slots:
                # 過去の時間帯はスキップして未来を詰める
                if slot["hour"] < current_hour - 1:
                    continue
                    
                display_hour = slot["hour"] % 24
                t_str = f"{str(display_hour).zfill(2)}:00"
                temp_val = slot["temp"]
                
                # 降水確率を時間帯に合わせて動的に判定
                prob_val = 0
                if slot["hour"] < 6: prob_val = int(chance_of_rain.get('T00_06', '0%').replace('%',''))
                elif slot["hour"] < 12: prob_val = int(chance_of_rain.get('T06_12', '0%').replace('%',''))
                elif slot["hour"] < 18: prob_val = int(chance_of_rain.get('T12_18', '0%').replace('%',''))
                else: prob_val = int(chance_of_rain.get('T18_24', '0%').replace('%',''))
                
                weather_text = today_forecast['telop']
                emoji = get_weather_emoji(weather_text)
                clothing = get_clothing_advice(temp_val)
                
                temp_str = f"{temp_val}°C"
                prob_str = f"{prob_val}%"
                temp_aligned = temp_str.rjust(5)
                prob_aligned = prob_str.rjust(4)
                
                forecast_lines.append(f"{t_str} {emoji} {temp_aligned} {prob_aligned} {clothing}")
                count += 1
                if count >= 5: # 縦余白を完全に埋める「5行表示」
                    break
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（国内Livedoor API・タイポ修正5行） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
