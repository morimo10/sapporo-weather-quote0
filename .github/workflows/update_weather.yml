name: Update Weather and Clothing for Dot V2 (Pure JMA Hourly Eco Version)

on:
  schedule:
    - cron: '0 21-23,0-12 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        JMA_FORECAST_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        # еӨ©ж°—гӮігғјгғүпјҲJMA Weather CodeпјүгӮ’гӮ·гғігғ—гғ«гҒӘиЁҳеҸ·гҒ«еӨүжҸӣгҒҷгӮӢгғһгғғгғ”гғігӮ°гғһгӮ№гӮҝ
        WEATHER_CODE_MAP = {
            "100": "вҳҖ", "101": "вҳҖвҶ’вҳҒ", "102": "вҳҖвҶ’вҳ”", "103": "вҳҖвҶ’вҳ”", "104": "вҳҖвҶ’вҳғ", "105": "вҳҖвҶ’вҳғ", "106": "вҳҖвҶ’вҳ”", "107": "вҳҖвҶ’вҳғ", "108": "вҳҖвҶ’вҳ”", "110": "вҳҖвҶ’вҳҒ", "111": "вҳҖвҶ’вҳҒ", "112": "вҳҖвҶ’вҳ”", "113": "вҳҖвҶ’вҳ”", "114": "вҳҖвҶ’вҳ”", "115": "вҳҖвҶ’вҳғ", "116": "вҳҖвҶ’вҳғ", "117": "вҳҖвҶ’вҳғ", "118": "вҳҖвҶ’вҳ”", "119": "вҳҖвҶ’вҡЎ", "120": "вҳҖвҶ’вҳ”", "121": "вҳҖвҶ’вҳ”", "122": "вҳҖвҶ’вҡЎ", "123": "вҳҖвҶ’вҡЎ", "124": "вҳҖвҶ’вҡЎ", "125": "вҳҖвҶ’вҡЎ", "126": "вҳҖвҶ’вҳ”", "127": "вҳҖвҶ’вҳ”", "128": "вҳҖвҶ’вҳ”", "130": "жңқеӨ•вҳҖ", "131": "жңқеӨ•вҳҖ", "132": "жңқеӨ•вҳҖ", "140": "вҳҖвҶ’вҳғ", "160": "вҳҖвҶ’вҳғ", "170": "вҳҖвҶ’вҳғ", "181": "вҳҖвҶ’вҳғ",
            "200": "вҳҒ", "201": "вҳҒвҶ’вҳҖ", "202": "вҳҒвҶ’вҳ”", "203": "вҳҒвҶ’вҳ”", "204": "вҳҒвҶ’вҳғ", "205": "вҳҒвҶ’вҳғ", "206": "вҳҒвҶ’вҳ”", "207": "вҳҒвҶ’вҳғ", "208": "вҳҒвҶ’вҳ”", "209": "йң§", "210": "вҳҒвҶ’вҳҖ", "211": "вҳҒвҶ’вҳҖ", "212": "вҳҒвҶ’вҳ”", "213": "вҳҒвҶ’вҳ”", "214": "вҳҒвҶ’вҳ”", "215": "вҳҒвҶ’вҳғ", "216": "вҳҒвҶ’вҳғ", "217": "вҳҒвҶ’вҳғ", "218": "вҳҒвҶ’вҳ”", "219": "вҳҒвҶ’вҡЎ", "220": "вҳҒвҶ’вҳ”", "221": "вҳҒвҶ’вҳ”", "222": "вҳҒвҶ’вҡЎ", "223": "вҳҒвҶ’вҡЎ", "224": "вҳҒвҶ’вҡЎ", "225": "вҳҒвҶ’вҡЎ", "226": "вҳҒвҶ’вҳ”", "228": "вҳҒвҶ’вҳғ", "229": "вҳҒвҶ’вҳғ", "230": "жҳјвҳҖ", "240": "вҳҒвҶ’вҳғ", "250": "вҳҒвҶ’вҳғ", "260": "вҳҒвҶ’вҳғ", "270": "вҳҒвҶ’вҳғ", "281": "вҳҒвҶ’вҳғ",
            "300": "вҳ”", "301": "вҳ”вҶ’вҳҖ", "302": "вҳ”вҶ’вҳҒ", "303": "вҳ”", "304": "вҳ”вҶ’вҳғ", "306": "вҳ”", "308": "еӨ§йӣЁ", "309": "дёҖжҷӮвҳ”", "311": "вҳ”вҶ’вҳҖ", "313": "вҳ”вҶ’вҳҒ", "314": "вҳ”", "315": "вҳ”вҶ’вҳғ", "316": "вҳ”", "317": "вҳ”", "320": "вҳ”вҶ’вҳғ", "321": "вҳ”вҶ’вҳғ", "322": "вҳ”вҶ’вҡЎ", "323": "вҳ”вҶ’вҡЎ", "324": "вҳ”вҶ’вҡЎ", "325": "вҳ”вҶ’вҡЎ", "326": "вҳ”вҶ’вҡЎ", "327": "вҳ”вҶ’вҡЎ", "328": "вҳ”вҶ’вҳғ", "329": "вҳ”вҶ’вҳғ", "340": "вҳ”вҶ’вҳғ", "350": "вҳ”вҶ’вҡЎ", "361": "вҳ”вҶ’вҳғ", "371": "вҳ”вҶ’вҳғ",
            "400": "вҳғ", "401": "вҳғвҶ’вҳҖ", "402": "вҳғвҶ’вҳҒ", "403": "вҳғ", "405": "еӨ§йӣӘ", "406": "вҳғвҶ’вҳ”", "407": "вҳғвҶ’вҳ”", "409": "дёҖжҷӮвҳғ", "411": "вҳғвҶ’вҳҖ", "413": "вҳғвҶ’вҳҒ", "414": "вҳғ", "415": "вҳғвҶ’вҳ”", "420": "вҳғвҶ’вҳ”", "421": "вҳғвҶ’вҳ”", "422": "вҳғвҶ’вҡЎ", "423": "вҳғвҶ’вҡЎ", "425": "вҳғвҶ’вҡЎ", "426": "вҳғвҶ’вҡЎ", "427": "вҳғвҶ’вҡЎ", "430": "вҳғвҶ’вҳ”", "450": "вҳғвҶ’вҡЎ"
        }

        def get_weather_symbol_by_code(code_str):
            return WEATHER_CODE_MAP.get(code_str, "вҳҒ")

        def get_clothing_advice(temp):
            if temp is None: return " е…ЁзқҖ"
            if temp >= 30: return " пјҙгӮ·гғЈгғ„"
            elif temp >= 25: return " еҚҠиў–гӮ·гғЈгғ„"
            elif temp >= 20: return " й•·иў–гӮ·гғЈгғ„"
            elif temp >= 15: return " гӮёгғЈгӮұгғғгғҲ"
            elif temp >= 10: return " гӮігғјгғҲ"
            else: return " гғҖгӮҰгғі"

        try:
            res = requests.get(JMA_FORECAST_URL).json()
            area_forecast = res[0]
            
            jst = timezone(timedelta(hours=9))
            now_utc = datetime.now(timezone.utc)
            now = now_utc.astimezone(jst)
            current_hour = now.hour
            
            if 17 <= current_hour <= 23:
                is_tomorrow_data = True
                label_head = "жҳҺж—Ҙ"
            else:
                is_tomorrow_data = False
                label_head = "д»Ҡж—Ҙ"
                
            day_idx = 1 if is_tomorrow_data else 0
            
            # --- 1. еҹәжң¬зҡ„гҒӘжңҖй«ҳгғ»жңҖдҪҺж°—жё©гҒ®зўәдҝқ ---
            temp_time_series = area_forecast['timeSeries'][2]
            temp_areas = temp_time_series['areas']
            sapporo_temp = next((a for a in temp_areas if a['area']['code'] == '016010'), temp_areas[0])
            temps = sapporo_temp['temps']
            
            tmin_raw, tmax_raw = "", ""
            if len(temps) >= 4:
                tmin_raw = temps[2] if is_tomorrow_data else temps[0]
                tmax_raw = temps[3] if is_tomorrow_data else temps[1]
            else:
                tmin_raw = temps[0] if len(temps) > 0 else ""
                tmax_raw = temps[1] if len(temps) > 1 else ""

            if not is_tomorrow_data and (not tmin_raw or tmin_raw == tmax_raw):
                try: tmin_raw = res[1]['timeSeries'][1]['areas'][0]['tempsMin'][0]
                except: tmin_raw = "14"
            if not tmax_raw: tmax_raw = "25"

            t_min_num = int(tmin_raw) if tmin_raw.strip() else 14
            t_max_num = int(tmax_raw) if tmax_raw.strip() else 25

            # --- 2. жҷӮзі»еҲ—дәҲе ұпјҲtimeSeries[3]пјүгӮ’и§ЈжһҗгҒ—гҒҰ3жҷӮй–“жҜҺгҒ®еӨ©ж°—иЁҳеҸ·гҒЁгғӘгӮўгғ«йҷҚж°ҙзўәзҺҮгӮ’жҠҪеҮә ---
            hourly_series = area_forecast['timeSeries'][3]
            hourly_areas = hourly_series['areas']
            sapporo_hourly = next((a for a in hourly_areas if a['area']['code'] == '016010'), hourly_areas[0])
            
            target_date_str = (now + timedelta(days=1)).strftime("%Y-%m-%d") if is_tomorrow_data else now.strftime("%Y-%m-%d")
            
            # гӮҝгғјгӮІгғғгғҲж—ҘгҒ®жҷӮзі»еҲ—гғҮгғјгӮҝгҒ®гҒҝгӮ’жҠҪеҮә
            day_codes = []
            day_pops = []
            for t_str, code, pop in zip(hourly_series['timeDefines'], sapporo_hourly['weatherCodes'], sapporo_hourly['pops']):
                if target_date_str in t_str:
                    # жҷӮй–“(HH)гӮ’жҠҪеҮә
                    dt_obj = datetime.fromisoformat(t_str).astimezone(jst)
                    day_codes.append((dt_obj.hour, code))
                    day_pops.append(int(pop))
            
            # 1ж—ҘгҒ®жңҖеӨ§йҷҚж°ҙзўәзҺҮ
            max_prob = max(day_pops) if day_pops else 0
            prob_str = f"{max_prob}%"
            umbrella_mark = " вҳ”" if max_prob >= 50 else (" вҳӮ" if max_prob >= 30 else "")

            # д»ЈиЎЁгҒ®еӨ©ж°—гӮўгӮӨгӮігғігӮ’гғһгӮ№гӮҝгҒӢгӮүжұәе®ҡ
            weather_areas = area_forecast['timeSeries'][0]['areas']
            sapporo_weather = next((a for a in weather_areas if a['area']['code'] == '016010'), weather_areas[0])
            main_code = sapporo_weather['weatherCodes'][day_idx]
            day_symbol = get_weather_symbol_by_code(main_code)
            
            title_text = f"жңӯе№ҢеёӮдёӯеӨ®еҢәгҒ®{label_head}: {day_symbol}"

            # --- 3. жҷӮй–“еёҜгҒ”гҒЁгҒ®гғ”гғігғқгӮӨгғігғҲеӨ©ж°—гғһгғјгӮҜгҒЁж°—жё©жұәе®ҡ ---
            # и©ІеҪ“гҒҷгӮӢжҷӮй–“пјҲ6, 12, 18жҷӮпјүгҒ®гӮігғјгғүгӮ’жӨңзҙўгҖҒгҒӘгҒ‘гӮҢгҒ°е…ЁдҪ“гҒ®day_symbolгӮ’дҪҝз”Ё
            symbol_06 = next((get_weather_symbol_by_code(c) for h, c in day_codes if h == 6), day_symbol)
            symbol_12 = next((get_weather_symbol_by_code(c) for h, c in day_codes if h == 12), day_symbol)
            symbol_18 = next((get_weather_symbol_by_code(c) for h, c in day_codes if h == 18), day_symbol)

            temp_06 = t_min_num + 1
            temp_12 = t_max_num - 2
            temp_18 = t_max_num - 4
            
            forecast_lines = [
                f"жңҖеӨ§йҷҚж°ҙзўәзҺҮпјҡ{prob_str}{umbrella_mark}",
                f"жңҖдҪҺ: {tmin_raw}В°C  жңҖй«ҳ: {tmax_raw}В°C",
                f"06:00 {symbol_06}  {temp_06}В°C{get_clothing_advice(temp_06)}",
                f"12:00 {symbol_12}  {temp_12}В°C{get_clothing_advice(temp_12)}",
                f"18:00 {symbol_18}  {temp_18}В°C{get_clothing_advice(temp_18)}"
            ]
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- йҖҒдҝЎгғҮгғјгӮҝеҶ…е®№гғӯгӮ°пјҲжҷӮзі»еҲ—е®Ңе…ЁзҹўеҚ°еҜҫеҝңзүҲпјү ---")
            print(f"JST Time: {now.strftime('%Y-%m-%d %H:%M:%S')}")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"жҲҗеҠҹ: {response.json().get('message')}")
            else:
                print(f"гӮЁгғ©гғјзҷәз”ҹ (гӮ№гғҶгғјгӮҝгӮ№гӮігғјгғү: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"гӮ№гӮҜгғӘгғ—гғҲе®ҹиЎҢгӮЁгғ©гғј: {e}")
            exit(1)
        EOF
