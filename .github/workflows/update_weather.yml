name: Update Weather and Clothing for Dot V2 (Dual API Sync)

on:
  schedule:
    # 30分ごとに自動実行
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Generate and Push to Dot API
      env:
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 【対策】APIを2つに完全分離。構造の混ざりによるバグを根絶します。
        URL_JMA = "https://api.open-meteo.com/v1/forecast?latitude=43.0620&longitude=141.3540&hourly=temperature_2m,precipitation_probability,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&models=jma_seamless"
        URL_STD = "https://api.open-meteo.com/v1/forecast?latitude=43.0620&longitude=141.3540&hourly=precipitation_probability&timezone=Asia%2FTokyo"
        
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(code):
            if code is None: return "⛅"
            if code == 0: return "☀️"
            elif code in [1, 2, 3]: return "⛅"
            elif code in [45, 48]: return "🌫️"
            elif code in [51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82]: return "☔"
            elif code in [71, 73, 75, 77, 85, 86]: return "❄️"
            elif code in [95, 96, 99]: return "⚡"
            return "⛅"

        def get_clothing_advice(temp):
            if temp is None: return " 調整着"
            if temp >= 30.0: return " Tシャツ"
            elif temp >= 25.0: return " 半袖"
            elif temp >= 20.0: return " 長袖"
            elif temp >= 15.0: return " セーター"
            elif temp >= 10.0: return " ジャケット"
            elif temp >= 5.0: return " コート"
            else: return " ダウン"

        try:
            # 1. 気象庁データの読み込み
            res_jma = requests.get(URL_JMA).json()
            # 2. 保険用世界標準データの読み込み
            res_std = requests.get(URL_STD).json()
            
            if 'hourly' not in res_jma or 'daily' not in res_jma:
                print("気象庁APIのレスポンスが不正です")
                exit(1)
                
            hourly_jma = res_jma['hourly']
            daily_jma = res_jma['daily']
            hourly_std = res_std.get('hourly', {})
            
            # 各データ配列の個別抽出（jma_seamlessをダイレクトに指定）
            h_temp = hourly_jma.get('temperature_2m_jma_seamless', [])
            h_prob_jma = hourly_jma.get('precipitation_probability_jma_seamless', [])
            h_code = hourly_jma.get('weather_code_jma_seamless', [])
            
            # バックアップ用の標準モデル降水確率（モデル混ざりなしの純粋な配列）
            h_prob_std = hourly_std.get('precipitation_probability', [])
            
            d_max = daily_jma.get('temperature_2m_max_jma_seamless', [])
            d_min = daily_jma.get('temperature_2m_min_jma_seamless', [])
            
            max_val = d_max[0] if d_max and len(d_max) > 0 else None
            min_val = d_min[0] if d_min and len(d_min) > 0 else None
            
            max_str = f"{round(max_val)}" if max_val is not None else "?"
            min_str = f"{round(min_val)}" if min_val is not None else "?"
            
            title_text = f"札幌市中央区 {max_str}〜{min_str}℃"
            
            jst = timezone(timedelta(hours=9))
            now = datetime.now(jst)
            
            times = [datetime.fromisoformat(t).replace(tzinfo=jst) for t in hourly_jma.get('time', [])]
            
            base_hour = now.hour if now.hour % 2 == 0 else now.hour - 1
            if base_hour < 0: base_hour = 0
            
            start_time = now.replace(hour=base_hour, minute=0, second=0, microsecond=0)
            if start_time < now - timedelta(hours=1, minutes=30):
                start_time += timedelta(hours=2)
            
            forecast_lines = []
            target_indices = []
            
            for i in range(5):
                loop_time = start_time + timedelta(hours=i * 2)
                idx = min(range(len(times)), key=lambda k: abs(times[k] - loop_time))
                if idx < len(times):
                    target_indices.append((idx, loop_time.strftime("%H:%M")))
            
            for idx, t_str in target_indices:
                raw_temp = h_temp[idx] if idx < len(h_temp) else None
                raw_code = h_code[idx] if idx < len(h_code) else None
                
                # --- 【修正】完全に分離された安全なマージロジック ---
                # まず純度100%の気象庁データを参照する
                raw_prob = None
                if idx < len(h_prob_jma):
                    raw_prob = h_prob_jma[idx]
                
                # 気象庁データが「夜間で途切れてNone」の時だけ、別APIから取った標準データを安全に結合
                if raw_prob is None and idx < len(h_prob_std):
                    raw_prob = h_prob_std[idx]
                
                if raw_temp is not None:
                    temp_num = round(raw_temp)
                    temp_display = f"{temp_num}°C"
                    clothing = get_clothing_advice(temp_num)
                else:
                    temp_display = "?°C"
                    clothing = get_clothing_advice(None)
                
                if raw_prob is not None:
                    prob_num = int(raw_prob)
                    prob_display = f"{prob_num}%"
                else:
                    prob_display = "?%"
                
                emoji = get_weather_emoji(raw_code)
                
                temp_aligned = temp_display.rjust(5)
                prob_aligned = prob_display.rjust(4)
                
                forecast_lines.append(f"{t_str} {emoji} {temp_aligned} {prob_aligned}{clothing}")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（2系統分離・マージ完成版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("---------------------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message,
                "style": "UnifontExMono16"
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
