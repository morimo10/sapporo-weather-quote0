name: Update Weather and Clothing for Dot V2 (Yahoo Fixed Final)

on:
  schedule:
    # 30分ごとに自動実行 (毎時0分、30分にトリガー)
    - cron: '0,30 * * * *'
  workflow_dispatch: # Actionsタブから手動で即時実行できるボタンを有効化

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Generate and Push to Dot API
      env:
        # GitHub Secretsから安全に読み込み
        QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
        QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from bs4 import BeautifulSoup
        from datetime import datetime, timedelta, timezone

        API_KEY = os.environ.get("QUOTE0_API_KEY")
        DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

        # 札幌市中央区のピンポイント予報ページURL
        YAHOO_WEATHER_URL = "https://weather.yahoo.co.jp/weather/jp/1b/1400/1101.html"
        DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

        def get_weather_emoji(text):
            if "晴" in text: return "☀️"
            elif "雨" in text: return "☔"
            elif "雪" in text: return "❄️"
            elif "雷" in text: return "⚡"
            elif "霧" in text: return "🌫️"
            return "⛅"

        def get_clothing_advice(temp):
            if temp >= 25: return "半袖シャツ"
            elif temp >= 20: return "長袖シャツ"
            elif temp >= 16: return "カーディガン"
            elif temp >= 12: return "セーター"
            elif temp >= 8: return "トレンチコート"
            elif temp >= 5: return "冬物コート"
            else: return "ダウンコート"

        try:
            headers_browser = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
            response_html = requests.get(YAHOO_WEATHER_URL, headers=headers_browser)
            response_html.encoding = 'utf-8'
            soup = BeautifulSoup(response_html.text, "html.parser")
            
            # --- 最高気温・最低気温の抽出 ---
            weather_box = soup.find("div", id="presentation") or soup.find("div", class_="forecastCity")
            high_box = weather_box.find("em", class_="high") if weather_box else None
            low_box = weather_box.find("em", class_="low") if weather_box else None
            
            if not high_box: high_box = soup.find("em", class_="high")
            if not low_box: low_box = soup.find("em", class_="low")
                
            max_temp = int(high_box.text) if high_box and high_box.text.replace("-","").isdigit() else 24
            min_temp = int(low_box.text) if low_box and low_box.text.replace("-","").isdigit() else 14
            
            title_text = f"札幌市中央区 {max_temp}℃〜{min_temp}℃"
            
            # --- 3時間ごと予報テーブルの解析 ---
            timeline_div = soup.find("div", id="threeHourTimeline") or soup.find("table", class_="yjw_table2").parent
            
            hours_data = []
            weather_data = []
            temp_data = []
            prob_data = []
            
            for tr in timeline_div.find_all("tr"):
                first_td = tr.find("td")
                if not first_td: continue
                header_text = first_td.text.strip()
                tds = tr.find_all("td")[1:]
                
                if "時間" in header_text:
                    hours_data = [int("".join(filter(str.isdigit, td.text.strip()))) for td in tds if "".join(filter(str.isdigit, td.text.strip())).isdigit()]
                elif "天気" in header_text:
                    for td in tds:
                        img = td.find("img")
                        weather_data.append(img["alt"].strip() if img and img.has_attr("alt") else td.text.strip())
                elif "気温" in header_text:
                    for td in tds:
                        num = "".join(filter(lambda c: c.isdigit() or c == "-", td.text.strip()))
                        temp_data.append(int(num) if num else max_temp)
                elif "降水" in header_text:
                    prob_data = [td.text.strip() for td in tds]

            # --- 【修正】現在時刻から、表示すべき「最初のマスの位置」を自動検索 ---
            jst = timezone(timedelta(hours=9))
            current_hour = datetime.now(jst).hour
            
            # Yahoo天気の残っている時間（例：[12, 15, 18, 21] など）から、今に一番近いものを探す
            start_idx = 0
            if hours_data:
                # 現在時刻以上の時間、または最後のマスをベースにする
                closest_hour = min(hours_data, key=lambda x: abs(x - current_hour))
                start_idx = hours_data.index(closest_hour)
            
            # 見つけた位置から、3回分のデータを取得
            target_indices = [start_idx, start_idx + 1, start_idx + 2]
            forecast_lines = []
            
            for idx in target_indices:
                if idx < len(hours_data) and idx < len(temp_data) and idx < len(weather_data) and idx < len(prob_data):
                    time_str = str(hours_data[idx]).zfill(2) + ":00"
                    
                    weather_text = weather_data[idx]
                    temp_val = temp_data[idx]
                    prob_val = prob_data[idx]
                    
                    if "%" not in prob_val:
                        prob_val = f"{prob_val}%"
                    
                    emoji = get_weather_emoji(weather_text)
                    clothing = get_clothing_advice(temp_val)
                    
                    temp_str = f"{temp_val}°C"
                    temp_aligned = temp_str.rjust(5)
                    prob_aligned = prob_val.rjust(4)
                    
                    forecast_lines.append(f"{time_str} {emoji} {temp_aligned} {prob_aligned} {clothing}")
            
            # 万が一夜遅すぎて翌日のデータがなく配列が足りない時だけのセーフティ
            if not forecast_lines:
                forecast_lines.append("本日の予報は終了しました")
            
            weather_message = "\n".join(forecast_lines)
            
            print("--- 送信データ内容ログ（時間変動対応版） ---")
            print(f"Title  : {title_text}")
            print(f"Message:\n{weather_message}")
            print("------------------------------------------")

            headers = {
                "Authorization": f"Bearer {API_KEY}",
                "Content-Type": "application/json"
            }
            payload = {
                "refreshNow": True,
                "title": title_text,
                "message": weather_message
            }
            
            response = requests.post(DOT_API_URL, headers=headers, json=payload)
            if response.status_code in [200, 201]:
                print(f"成功: {response.json().get('message')}")
            else:
                print(f"エラー発生 (ステータスコード: {response.status_code})")
                exit(1)

        except Exception as e:
            print(f"スクリプト実行エラー: {e}")
            exit(1)
        EOF
