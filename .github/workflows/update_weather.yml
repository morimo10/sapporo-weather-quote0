name: Update Weather and Clothing for Dot V2 (True JMA Strict Area Sync)

on:
  schedule:
    - cron: '17 0-9,21-23 * * *'
    - cron: '37 0-9,21-23 * * *'
    - cron: '47 0-9,21-23 * * *'
    - cron: '53 0-9,21-23 * * *'
  workflow_dispatch:

concurrency:
  group: daytime-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. キャッシュの復元
      - name: Restore Last Run Hour and Temp Cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            last_run_hour.txt
            weather_history.json
          key: weather-v2-cache-v29-${{ github.run_id }}
          restore-keys: |
            weather-v2-cache-v29-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 2. Pythonスクリプトを実行（JST変換処理を厳密に実施）
      - name: Generate and Push to Dot API
        env:
          QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
          QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
        run: |
          cat << 'EOF' > update_weather.py
          import os
          import json
          import sys
          import time
          import requests
          from datetime import datetime, timedelta, timezone

          API_KEY = os.environ.get("QUOTE0_API_KEY")
          DEVICE_ID = os.environ.get("QUOTE0_DEVICE_ID")

          JMA_FORECAST_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json"
          DOT_API_URL = f"https://dot.mindreset.tech/api/authV2/open/device/{DEVICE_ID}/text"

          def code_to_symbol(code_str):
              c = str(code_str)
              if c.startswith("1"): return "☀"
              if c.startswith("2"): return "☁"
              if c.startswith("3"): return "☔"
              if c.startswith("4"): return "☃"
              return "☁"

          def get_clothing_advice(temp):
              if temp is None: return "不明？"
              if temp >= 30: return "Ｔシャツ"
              elif temp >= 25: return "半袖シャツ"
              elif temp >= 20: return "長袖シャツ"
              elif temp >= 15: return "ジャケット"
              elif temp >= 10: return "コート"
              else: return "ダウン"

          try:
              # タイムゾーン定義
              utc_tz = timezone.utc
              jst_tz = timezone(timedelta(hours=9))

              now_utc = datetime.now(utc_tz)
              now = now_utc.astimezone(jst_tz)
              current_hour = now.hour

              if current_hour < 7 or current_hour >= 22:
                  print(f"現在の時刻は {now.strftime('%H:%M')} です。7時〜21時の時間外のため実行をスキップします。")
                  sys.exit(0)

              current_hour_str = now.strftime("%Y-%m-%d-%H")
              cache_file = "last_run_hour.txt"
              history_file = "weather_history.json"
              
              if os.path.exists(cache_file):
                  with open(cache_file, "r") as f:
                      last_run_hour = f.read().strip()
                  if last_run_hour == current_hour_str:
                      print(f"すでに【{now.strftime('%H:00')}時台】の最初の実行は完了しています。")
                      sys.exit(0)

              try:
                  res = requests.get(JMA_FORECAST_URL, timeout=15).json()
              except Exception as e:
                  print(f"気象庁サーバーからのデータ取得に失敗しました: {e}")
                  sys.exit(0)

              if 17 <= current_hour <= 23:
                  is_tomorrow_data = True
                  label_head = "明日"
              else:
                  is_tomorrow_data = False
                  label_head = "今日"
                  
              today_date_str = now.strftime("%Y-%m-%d")
              target_date_str = (now + timedelta(days=1)).strftime("%Y-%m-%d") if is_tomorrow_data else today_date_str

              # --- 1. 通常の府県予報ブロック (res[0]) から基本データ抽出 ---
              base_series = res[0]['timeSeries'][0]
              weather_areas = base_series['areas']
              sapporo_weather = next((a for a in weather_areas if str(a['area']['code']) == "016010"), None)
              if not sapporo_weather:
                  sapporo_weather = next((a for a in weather_areas if str(a['area']['code']).startswith("0160")), weather_areas[0])
              
              target_index = 1 if is_tomorrow_data else 0

              # 降水確率の抽出
              hourly_pops = []
              pop_times = []
              for ts in res[0].get("timeSeries", []):
                  for a in ts.get("areas", []):
                      if str(a['area']['code']) in ["016010", "016000"] or "石狩" in a['area']['name']:
                          if 'pops' in a:
                              hourly_pops = a['pops']
                              pop_times = ts.get('timeDefines', [])

              day_pops = []
              for t_str, pop in zip(pop_times, hourly_pops):
                  dt_parsed = datetime.fromisoformat(t_str.replace("Z", "+00:00")).astimezone(jst_tz)
                  if dt_parsed.strftime("%Y-%m-%d") == target_date_str and str(pop).strip() != "":
                      if is_tomorrow_data and dt_parsed.hour < 6: continue
                      day_pops.append(int(pop))
              
              max_prob = max(day_pops) if day_pops else 0
              prob_str = f"{max_prob}%"
              umbrella_mark = "☔" if max_prob >= 50 else ("☂" if max_prob >= 30 else "")

              # 今日・明日の最高・最低気温の抽出
              temp_series = res[0]['timeSeries'][2]
              temps = next((a for a in temp_series['areas'] if str(a['area']['code']) in ["016010", "016000"]), temp_series['areas'][0])['temps']
              tmin_raw = temps[2] if is_tomorrow_data and len(temps) >= 4 else (temps[0] if len(temps) > 0 else "14")
              tmax_raw = temps[3] if is_tomorrow_data and len(temps) >= 4 else (temps[1] if len(temps) > 1 else "25")

              if not is_tomorrow_data and (not tmin_raw or str(tmin_raw).strip() == "" or tmin_raw == tmax_raw):
                  try: tmin_raw = res[1]['timeSeries'][1]['areas'][0]['tempsMin'][0]
                  except: tmin_raw = "14"
              if not tmax_raw or str(tmax_raw).strip() == "": tmax_raw = "25"

              t_min_num = int(str(tmin_raw).strip()) if str(tmin_raw).strip().isdigit() else 14
              t_max_num = int(str(tmax_raw).strip()) if str(tmax_raw).strip().isdigit() else 25

              # 前日比計算用ヒストリ保存
              history_data = {}
              if os.path.exists(history_file):
                  try:
                      with open(history_file, "r") as f: history_data = json.load(f)
                  except: pass

              diff_str = "(?)"
              if is_tomorrow_data and today_date_str in history_data:
                  diff = t_max_num - history_data[today_date_str]
                  diff_str = f"(+{diff})" if diff > 0 else (f"({diff})" if diff < 0 else "(±0)")
              elif not is_tomorrow_data:
                  yesterday_str = (now - timedelta(days=1)).strftime("%Y-%m-%d")
                  if yesterday_str in history_data:
                      diff = t_max_num - history_data[yesterday_str]
                      diff_str = f"(+{diff})" if diff > 0 else (f"({diff})" if diff < 0 else "(±0)")

              history_data[target_date_str] = t_max_num

              # --- 2. 【地域時系列予報】ブロック (res[1]) からパース ---
              h_weather_map = {}
              h_temp_map = {}
              
              if len(res) > 1:
                  hourly_block = res[1]
                  hourly_time_defines = hourly_block.get("timeDefines", [])
                  
                  for ts in hourly_block.get("timeSeries", []):
                      for a in ts.get("areas", []):
                          if str(a['area']['code']) == "016010":
                              if "weatherCodes" in a:
                                  w_codes = a["weatherCodes"]
                                  for idx, t_str in enumerate(hourly_time_defines):
                                      # 気象庁のISO表記時刻（末尾にZがつくかどうかにかかわらず安全に処理）
                                      cleaned_t = t_str.replace("Z", "+00:00")
                                      dt_parsed = datetime.fromisoformat(cleaned_t).astimezone(jst_tz)
                                      
                                      if dt_parsed.strftime("%Y-%m-%d") == target_date_str and idx < len(w_codes):
                                          hour_key = dt_parsed.strftime("%H")
                                          h_weather_map[hour_key] = code_to_symbol(w_codes[idx])
                                          print(f"[DEBUG-LOAD] 天気登録完了: 時刻={hour_key}時, マーク={h_weather_map[hour_key]} (元コード={w_codes[idx]})")
                              
                              if "temps" in a:
                                  t_values = a["temps"]
                                  for idx, t_str in enumerate(hourly_time_defines):
                                      cleaned_t = t_str.replace("Z", "+00:00")
                                      dt_parsed = datetime.fromisoformat(cleaned_t).astimezone(jst_tz)
                                      
                                      if dt_parsed.strftime("%Y-%m-%d") == target_date_str and idx < len(t_values):
                                          if str(t_values[idx]).strip() != "":
                                              hour_key = dt_parsed.strftime("%H")
                                              h_temp_map[hour_key] = int(t_values[idx])
                                              print(f"[DEBUG-LOAD] 気温登録完了: 時刻={hour_key}時, 気温={h_temp_map[hour_key]}°C")

              # タイトルの代表天気は12時のものを使用（なければ府県予報から）
              main_symbol = h_weather_map.get("12", code_to_symbol(sapporo_weather['weatherCodes'][target_index]))
              title_text = f"{label_head}札幌市中央区{main_symbol}"

              # 表示行の構築（直近最大4コマ）
              forecast_lines = [f"低:{t_min_num}°C 高:{t_max_num}°C{diff_str} 傘:{prob_str}{umbrella_mark}"]
              hourly_slots = [
                  ("06", "06:00"), ("09", "09:00"), ("12", "12:00"),
                  ("15", "15:00"), ("18", "18:00"), ("21", "21:00")
              ]
              
              valid_rows_count = 0
              for hour_val, label in hourly_slots:
                  if valid_rows_count >= 4: break
                  
                  base_dt = now + timedelta(days=1) if is_tomorrow_data else now
                  target_dt = base_dt.replace(hour=int(hour_val), minute=0, second=0, microsecond=0)
                  if now > target_dt + timedelta(hours=2): continue
                  
                  # マップから取得
                  if hour_val in h_weather_map:
                      sym = h_weather_map[hour_val]
                  else:
                      print(f"[DEBUG-OUTPUT] 時系列天気データ（{hour_val}時）がなかったためフォールバック発動。メイン天気（{main_symbol}）を適用")
                      sym = main_symbol
                  
                  if hour_val in h_temp_map:
                      temp = h_temp_map[hour_val]
                  else:
                      if hour_val == "06": temp = t_min_num + 1
                      elif hour_val == "09": temp = t_min_num + 4
                      elif hour_val == "12": temp = t_max_num - 2
                      elif hour_val == "15": temp = t_max_num - 1
                      elif hour_val == "18": temp = t_max_num - 3
                      else: temp = t_min_num + 3
                  
                  advice = get_clothing_advice(temp)
                  forecast_lines.append(f"{label} {sym} {temp}°C {advice}")
                  valid_rows_count += 1

              message_text = "\n".join(forecast_lines)

              # API送信
              headers = {
                  "Authorization": f"Bearer {API_KEY}",
                  "Content-Type": "application/json"
              }
              payload = {
                  "refreshNow": True,
                  "title": title_text,
                  "message": message_text
              }
              
              print("--- 送信データ内容ログ ---")
              print(f"Title : {title_text}")
              print("Message:")
              print(message_text)
              
              for attempt in range(3):
                  try:
                      response = requests.post(DOT_API_URL, headers=headers, json=payload, timeout=15)
                      if response.status_code == 200:
                          print("APIへの送信に成功しました。")
                          with open(cache_file, "w") as f: f.write(current_hour_str)
                          with open(history_file, "w") as f: json.dump(history_data, f, ensure_ascii=False, indent=2)
                          break
                      time.sleep(3)
                  except:
                      time.sleep(3)

          except Exception as e:
              print(f"エラーが発生しました: {e}")
              sys.exit(1)
          EOF
          python update_weather.py

      # 3. キャッシュを確実に保存
      - name: Save Run Hour and Temp Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            last_run_hour.txt
            weather_history.json
          key: weather-v2-cache-v29-${{ github.run_id }}
